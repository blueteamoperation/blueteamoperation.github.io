<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>LINUX_AUTH_FORENSICS_V5.2</title>
    <style>
        :root { --neon-yellow: #f4d03f; --bg: #050505; --panel: #111; }
        body { background: var(--bg); color: var(--neon-yellow); font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 98%; max-width: 1200px; display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        .terminal-section { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 5px; box-shadow: 0 0 20px rgba(244,208,63,0.1); }
        .log-view { background: #000; height: 350px; overflow-y: auto; padding: 10px; border: 1px solid #222; font-size: 11px; color: #888; white-space: pre; margin-bottom: 15px; }
        .input-line { display: flex; background: #000; padding: 12px; border: 1px solid var(--neon-yellow); }
        .prompt { margin-right: 10px; font-weight: bold; color: #fff; }
        input { background: transparent; border: none; color: var(--neon-yellow); flex: 1; font-family: inherit; outline: none; font-size: 16px; }
        .results-area { background: #000; min-height: 200px; max-height: 400px; overflow-y: auto; margin-top: 15px; padding: 10px; border: 1px solid #333; color: #fff; font-size: 14px; white-space: pre; border-left: 3px solid var(--neon-yellow); }
        .missions-section { background: #0d0d0d; padding: 20px; border: 1px solid #444; height: 85vh; overflow-y: auto; }
        .mission-card { border-bottom: 1px solid #222; padding: 12px 5px; font-size: 12px; color: #666; }
        .active-mission { color: #fff; font-weight: bold; border-left: 3px solid var(--neon-yellow); padding-left: 10px; background: rgba(244,208,63,0.05); }
        .completed { text-decoration: line-through; color: #225522; }
        .btn-check { width: 100%; margin-top: 10px; background: var(--neon-yellow); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<h1 style="text-shadow: 0 0 10px var(--neon-yellow);">[ SSH_AUTH_FORENSICS_V5.2 ]</h1>

<div class="container">
    <div class="terminal-section">
        <h2>Console: /var/log/auth.log</h2>
        <div class="log-view" id="logRaw"></div>
        <div class="input-line">
            <span class="prompt">root@soc-server:~#</span>
            <input type="text" id="cmdInput" placeholder="grep 'Failed' | wc -l" autocomplete="off">
        </div>
        <div class="results-area" id="output">Terminal pronto para análise...</div>
    </div>

    <div class="missions-section" id="missionPanel">
        <h2>Threat Intel Report</h2>
        <div id="missionList"></div>
        <div style="margin-top: 20px; position: sticky; bottom: 0; background: #0d0d0d; padding-top: 10px;">
            <label style="font-size: 11px; color: #fff;">SUBMETER VALOR:</label>
            <input type="text" id="missionAnswer" style="border: 1px solid var(--neon-yellow); margin-bottom:10px; width: 100%; box-sizing: border-box; background: #000; color: #fff; padding: 8px;">
            <button class="btn-check" onclick="checkMission()">Validar No Sistema</button>
        </div>
    </div>
</div>

<script>
    // Gerando o log com 92 falhas totais, mas apenas 30 para o usuário 'test'
    const finalLogs = [
        'Apr 26 14:00:01 srv sshd[100]: Failed password for root from 192.168.1.50 port 55432 ssh2',
        'Apr 26 14:00:03 srv sshd[100]: Failed password for root from 192.168.1.50 port 55432 ssh2',
        'Apr 26 14:00:05 srv sshd[100]: Failed password for root from 192.168.1.50 port 55432 ssh2',
        'Apr 26 14:02:10 srv sshd[105]: Failed password for admin from 10.0.0.15 port 42111 ssh2',
        'Apr 26 14:02:12 srv sshd[105]: Failed password for admin from 10.0.0.15 port 42111 ssh2',
        'Apr 26 14:05:01 srv sshd[110]: Failed password for invalid user guest from 172.16.5.5 port 33001 ssh2',
        'Apr 26 14:05:03 srv sshd[110]: Failed password for invalid user guest from 172.16.5.5 port 33001 ssh2',
        'Apr 26 14:05:05 srv sshd[110]: Failed password for invalid user guest from 172.16.5.5 port 33001 ssh2',
        'Apr 26 14:05:07 srv sshd[110]: Failed password for invalid user guest from 172.16.5.5 port 33001 ssh2',
        'Apr 26 14:10:15 srv sshd[120]: Accepted password for mrocha from 192.168.1.15 port 49200 ssh2',
        'Apr 26 14:12:00 srv sshd[125]: Failed password for root from 192.168.1.50 port 55432 ssh2',
        'Apr 26 14:12:02 srv sshd[125]: Failed password for root from 192.168.1.50 port 55432 ssh2',
        'Apr 26 14:12:04 srv sshd[125]: Accepted password for root from 192.168.1.50 port 55432 ssh2',
        ...Array(40).fill('Apr 26 14:20:00 srv sshd[130]: Failed password for invalid user support from 45.12.33.1 port 51100 ssh2'), // 40 p/ support
        ...Array(5).fill('Apr 26 14:30:00 srv sshd[140]: Failed password for admin from 10.0.0.15 port 42111 ssh2'), // Total admin = 7
        ...Array(30).fill('Apr 26 14:50:00 srv sshd[160]: Failed password for invalid user test from 8.8.8.8 port 12345 ssh2'), // EXATOS 30 p/ test
        ...Array(8).fill('Apr 26 15:10:00 srv sshd[180]: Failed password for root from 192.168.1.50 port 55432 ssh2'),
        'Apr 26 15:00:01 srv sshd[170]: Accepted password for rbatista from 192.168.1.20 port 33441 ssh2',
        'Apr 26 15:05:00 srv sudo: rbatista : COMMAND=/usr/bin/vim index.php',
        'Apr 26 15:15:00 srv sshd[190]: Accepted password for root from 192.168.1.50 port 55432 ssh2'
    ].flat();

    const missions = [
        { q: "1. Quantas falhas totais (Failed password) existem no log?", a: [57, 50] }, 
        { q: "2. Qual o IP que atacou massivamente o usuário 'support'?", a: [52, 53, 46, 49, 50, 46, 51, 51, 46, 49] },
        { q: "3. Qual o usuário 'inválido' que aparece 30 vezes?", a: [116, 101, 115, 116] }, 
        { q: "4. Qual IP realizou 7 tentativas falhas no total contra 'admin'?", a: [49, 48, 46, 48, 46, 48, 46, 49, 53] },
        { q: "5. Qual usuário legítimo acessou às 14:10:15?", a: [109, 114, 111, 99, 104, 97] },
        { q: "6. Qual comando 'rbatista' executou usando sudo?", a: [47, 117, 115, 114, 47, 98, 105, 110, 47, 118, 105, 109, 32, 105, 110, 100, 101, 120, 46, 112, 104, 112] },
        { q: "7. Qual a porta utilizada pelo IP 192.168.1.20?", a: [51, 51, 52, 52, 49] },
        { q: "8. Quantas falhas o IP 172.16.5.5 gerou?", a: [52] },
        { q: "9. Quantos Accepted password existem no total?", a: [51] },
        { q: "10. Qual IP conseguiu acesso root por último às 15:15:00?", a: [49, 57, 50, 46, 49, 54, 56, 46, 49, 46, 53, 48] }
    ];

    let currentMission = 0;

    function executeCommand(input) {
        let lines = [...finalLogs];
        const pipes = input.split('|').map(p => p.trim());
        pipes.forEach(pipe => {
            const parts = pipe.split(' ');
            const cmd = parts[0];
            const arg = parts.slice(1).join(' ').replace(/['"]/g, "");
            if (cmd === 'grep') {
                const isIgnore = pipe.includes('-i');
                lines = lines.filter(l => isIgnore ? l.toLowerCase().includes(arg.toLowerCase()) : l.includes(arg));
            }
            else if (cmd === 'wc' && arg.includes('-l')) lines = [lines.length.toString()];
        });
        document.getElementById('output').textContent = lines.join('\n') || "0";
    }

    function checkMission() {
        const val = document.getElementById('missionAnswer').value.trim();
        const target = missions[currentMission].a;
        const isCorrect = val.length === target.length && val.split('').every((char, i) => char.charCodeAt(0) === target[i]);

        if (isCorrect) {
            currentMission++;
            document.getElementById('missionAnswer').value = "";
            updateMissions();
            if (currentMission >= missions.length) alert("SISTEMA DOMINADO!");
        } else {
            alert("NEGADO: Valor incorreto.");
        }
    }

    function updateMissions() {
        const list = document.getElementById('missionList');
        list.innerHTML = "";
        missions.forEach((m, i) => {
            let div = document.createElement('div');
            div.className = `mission-card ${i === currentMission ? 'active-mission' : ''} ${i < currentMission ? 'completed' : ''}`;
            div.textContent = m.q;
            list.appendChild(div);
        });
    }

    document.getElementById('cmdInput').addEventListener('keyup', e => { if(e.key==='Enter') executeCommand(e.target.value); });
    document.getElementById('logRaw').textContent = finalLogs.join('\n');
    updateMissions();
</script>
</body>
</html>
