<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueTeamOps | Digital Forensics</title>

    <style>
        :root {
            --bg-color: #0a0a0a;
            --container-bg: #0f0f0f;
            --accent-cyan: #00ffff; /* Cor Ciano Neon */
            --text-gray: #a0a0a0;
            --border-color: #1a3a3a;
        }

        body {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg-color);
            color: var(--text-gray);
            line-height: 1.6;
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(0, 255, 255, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 255, 255, 0.02));
            z-index: 9999;
            pointer-events: none;
            background-size: 100% 4px, 3px 100%;
        }

        .header-banner {
            width: 100%;
            height: 350px;
            overflow: hidden;
            border-bottom: 3px solid var(--accent-cyan);
            position: relative;
        }

        .header-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(120%) brightness(40%);
        }

        .container {
            max-width: 900px;
            margin: -50px auto 50px;
            padding: 40px;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        h1.main-title {
            color: var(--accent-cyan);
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 5px;
        }

        .status-bar {
            font-size: 10px;
            color: var(--accent-cyan);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            font-size: 14px;
            color: var(--accent-cyan);
            background: rgba(0, 255, 255, 0.05);
            padding: 8px 15px;
            border-left: 4px solid var(--accent-cyan);
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        ul { list-style: none; padding: 0; margin-left: 10px; }

        li {
            margin: 12px 0;
            border-bottom: 1px dashed #1a3a3a;
            padding-bottom: 5px;
        }

        li::before {
            content: "> ";
            color: var(--accent-cyan);
        }

        a {
            text-decoration: none;
            color: #eee;
            transition: 0.3s;
            font-size: 14px;
        }

        a:hover {
            color: var(--accent-cyan);
            padding-left: 10px;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
        }

        .footer {
            text-align: center;
            font-size: 10px;
            color: #333;
            margin-top: 60px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="header-banner">
    <img src="https://raw.githubusercontent.com/blueteamoperation/blueteamoperation.github.io/refs/heads/main/header.png" alt="Forensic Header">
</div>

<div class="container">
    <h1 class="main-title">BLUE TEAM OPERATION</h1>
    <div class="status-bar">
        <span>STATUS: ACTIVE_INVESTIGATION</span>
        <span>SYSTEM: DFIR_TERMINAL</span>
        <span>ACCESS: ROOT</span>
    </div>

    <div class="section">
        <h2>Módulo 01 - Fundamentos</h2>
        <ul>
            <li><a href="https://blueteamoperation.github.io/MOD-1/ri.html" target="_blank">Ciclo de Resposta a Incidentes</a></li>
            <li><a href="https://blueteamoperation.github.io/MOD-1/matriz.html" target="_blank">Análise de Matriz de Risco</a></li>
            <li><a href="https://blueteamoperation.github.io/MOD-1/kill.html" target="_blank">Cyber Kill Chain Analysis</a></li>
        </ul>
    </div>

    <!-- Adicione os outros módulos aqui seguindo o mesmo padrão -->

    <div class="footer">
        --- END OF SESSION ---
    </div>
</div>

</body>
</html>
