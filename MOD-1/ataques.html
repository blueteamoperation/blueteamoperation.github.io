<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BLUE_TEAM_DIAGNOSTIC_v7_FIXED</title>
    <style>
        :root { --bl: #00d4ff; --gr: #39ff14; --rd: #ff3131; --bg: #05070a; --cd: #0d1117; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: #fff; padding: 20px; }
        .container { max-width: 900px; margin: auto; border: 1px solid #30363d; border-radius: 8px; background: var(--cd); overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        .header { background: #161b22; padding: 20px; border-bottom: 2px solid var(--gr); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; color: var(--gr); font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; }
        .main-content { padding: 25px; }
        .alert-box { background: #000; border: 1px solid #333; padding: 20px; border-radius: 6px; margin-bottom: 25px; color: #ffca28; font-size: 0.95rem; border-left: 5px solid #ffca28; min-height: 60px; line-height: 1.4; }
        .q-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        label { display: block; margin-bottom: 12px; font-weight: bold; font-size: 0.75rem; color: var(--bl); text-transform: uppercase; }
        .o-grp { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .i-grp { grid-template-columns: repeat(3, 1fr); }
        .opt { background: #1a1f26; border: 1px solid #333; padding: 12px; border-radius: 4px; cursor: pointer; text-align: center; font-size: 0.75rem; transition: 0.2s; }
        .opt:hover { border-color: var(--gr); }
        .opt.sel { background: var(--gr); color: #000; font-weight: bold; }
        select { width: 100%; padding: 12px; background: #1a1f26; color: white; border: 1px solid #333; border-radius: 4px; font-family: inherit; font-size: 0.85rem; cursor: pointer; outline: none; }
        .btn-v { width: 100%; padding: 18px; background: transparent; color: var(--gr); border: 1px solid var(--gr); border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-v:hover { background: var(--gr); color: #000; box-shadow: 0 0 20px rgba(57, 255, 20, 0.3); }
        #res { margin-top: 20px; padding: 15px; border-radius: 4px; text-align: center; display: none; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>VULN_ANALYSIS_V7</h1>
        <div id="cnt" style="color:var(--gr); font-size: 0.9rem;">CASO: 1 / 6</div>
    </div>

    <div class="main-content" id="game-body">
        <div class="alert-box" id="alert-stream">Iniciando sistemas...</div>

        <div class="q-grid">
            <div>
                <label>01. TIPO DA VULNERABILIDADE</label>
                <div class="o-grp" id="g-type">
                    <div class="opt" onclick="_s('t', this, 0)">Configuração</div>
                    <div class="opt" onclick="_s('t', this, 1)">Código</div>
                    <div class="opt" onclick="_s('t', this, 2)">Execução Remota</div>
                    <div class="opt" onclick="_s('t', this, 3)">Elevação de Privilégio</div>
                </div>
            </div>
            <div>
                <label>02. IMPACTO POTENCIAL</label>
                <div class="o-grp i-grp" id="g-impact">
                    <div class="opt" onclick="_s('i', this, 0)">Baixo</div>
                    <div class="opt" onclick="_s('i', this, 1)">Médio</div>
                    <div class="opt" onclick="_s('i', this, 2)">Alto</div>
                </div>
            </div>
        </div>

        <div style="margin-bottom: 25px;">
            <label>03. MELHOR AÇÃO DE MITIGAÇÃO</label>
            <select id="mit-sel">
                <option value="-1">-- SELECIONE A AÇÃO --</option>
                <option value="0">Aplicar Patch/Atualização de segurança imediata</option>
                <option value="1">Resetar senhas para padrão forte e aplicar MFA</option>
                <option value="2">Corrigir permissões de ACL e isolar segmento</option>
                <option value="3">Instalar barreiras físicas e monitoramento local</option>
            </select>
        </div>

        <button class="btn-v" onclick="_validate()">VALIDAR DIAGNÓSTICO</button>
        <div id="res"></div>
    </div>
</div>

<script>
(function(){
    // Banco de dados fixo com 6 casos
    const _D = [
        { q: "Servidor Apache Tomcat (WEB-01) desatualizado permitindo execução de código remoto (RCE).", t: 2, i: 2, m: 0 },
        { q: "Banco de Dados (DB-PROD) acessível via internet com usuário admin e senha padrão fábrica.", t: 0, i: 2, m: 1 },
        { q: "Detecção de biblioteca Log4j v2.14 em aplicação crítica de processamento de dados.", t: 1, i: 2, m: 0 },
        { q: "Usuário de nível estagiário possui permissão de leitura/escrita no diretório raiz do sistema.", t: 3, i: 2, m: 2 },
        { q: "Roteador de borda com protocolo Telnet ativo e sem restrição de IPs de gerência.", t: 0, i: 1, m: 2 },
        { q: "Terminal de autoatendimento físico com portas USB expostas e sem trava de segurança.", t: 0, i: 1, m: 3 }
    ];

    let _idx = 0;
    let _sel = { t: -1, i: -1 };

    function _load() {
        // Verifica se ainda existem casos antes de tentar carregar
        if (_idx < _D.length) {
            const c = _D[_idx];
            document.getElementById('alert-stream').innerText = `[ALERTA]: "${c.q}"`;
            document.getElementById('cnt').innerText = `CASO: ${_idx + 1} / ${_D.length}`;
            document.getElementById('res').style.display = "none";
            document.getElementById('mit-sel').value = "-1";
            document.querySelectorAll('.opt').forEach(o => o.classList.remove('sel'));
            _sel = { t: -1, i: -1 };
        } else {
            // Se passar do último, mostra tela final
            document.getElementById('game-body').innerHTML = "<h2 style='color:var(--gr); text-align:center; padding: 40px;'>🏆 MISSÃO CONCLUÍDA!<br><br><span style='font-size: 1rem; color: #fff;'>Você analisou todas as vulnerabilidades com sucesso. Sistema Protegido.</span></h2>";
        }
    }

    window._s = function(cat, el, val) {
        el.parentElement.querySelectorAll('.opt').forEach(o => o.classList.remove('sel'));
        el.classList.add('sel');
        _sel[cat] = val;
    };

    window._validate = function() {
        const mit = parseInt(document.getElementById('mit-sel').value);
        const r = document.getElementById('res');
        
        // Proteção para não validar se o jogo já acabou
        if (_idx >= _D.length) return;

        const current = _D[_idx];
        const isCorrect = (_sel.t === current.t && _sel.i === current.i && mit === current.m);
        
        r.style.display = "block";

        if(isCorrect) {
            r.innerText = "🎯 DIAGNÓSTICO CORRETO! Analisando próximo alerta...";
            r.style.color = "var(--gr)";
            r.style.border = "1px solid var(--gr)";
            
            setTimeout(() => {
                _idx++;
                _load();
            }, 1200);
        } else {
            r.innerText = "❌ ERRO NA ANÁLISE! Verifique os detalhes do alerta.";
            r.style.color = "var(--rd)";
            r.style.border = "1px solid var(--rd)";
        }
    };

    _load();
})();
</script>
</body>
</html>
