<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sytem-Security-Check</title>
    <style>
        :root { --n-g: #39ff14; --n-b: #00d4ff; --bg: #05080a; --cd: #10141b; }
        body { font-family: 'Consolas', monospace; background: var(--bg); color: #e0e0e0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; background: var(--cd); border: 1px solid #30363d; border-radius: 12px; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .header { background: #161b22; padding: 20px; border-bottom: 2px solid var(--n-g); text-align: center; }
        .header h1 { margin: 0; color: var(--n-g); text-transform: uppercase; letter-spacing: 2px; font-size: 1.5rem; }
        .game-area { padding: 30px; }
        .evidence-card { background: #000; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 25px; border-left: 5px solid var(--n-b); }
        .evidence-text { font-family: 'Consolas', monospace; font-size: 1.1rem; color: #ffca28; min-height: 50px; }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .option-btn { background: #1c2128; border: 1px solid #30363d; padding: 15px; border-radius: 6px; color: #fff; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .option-btn:hover:not(:disabled) { border-color: var(--n-g); background: #262c36; }
        .option-btn.correct { background: rgba(57, 255, 20, 0.2); border-color: var(--n-g); color: var(--n-g); }
        .option-btn.wrong { background: rgba(255, 49, 49, 0.2); border-color: #ff3131; color: #ff3131; }
        .progress-bar { width: 100%; height: 6px; background: #222; margin-top: 20px; }
        .p-f { height: 100%; width: 0%; background: var(--n-g); transition: 0.4s; }
        .score-board { margin-top: 15px; text-align: right; color: var(--n-g); font-size: 0.9rem; }
        #f-s { text-align: center; display: none; padding: 50px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>SOC_LEVEL_01_ANLYS</h1>
        <div id="cnt" style="font-size: 0.8rem; color: #8b949e;">INIT_CORE...</div>
    </div>
    <div class="game-area" id="qa">
        <div class="evidence-card">
            <h3 style="color:var(--n-b); font-size:0.7rem; margin:0 0 10px 0;">EVIDENCE_STREAM:</h3>
            <div class="evidence-text" id="evd"></div>
        </div>
        <div class="options-grid" id="opt"></div>
        <div class="progress-bar"><div class="p-f" id="pg"></div></div>
        <div class="score-board" id="sc">HITS: 0</div>
    </div>
    <div id="f-s">
        <h2 style="color: var(--n-g)">MISSION_ACCOMPLISHED</h2>
        <p id="f-m"></p>
        <button onclick="location.reload()" style="padding: 15px 30px; background: var(--n-g); border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase;">Restart_System</button>
    </div>
</div>

<script>
(function(){
    // Base64 corrigido para suportar acentuação PT-BR
    const _0xdb = [
        ["NTAwLjAwMCByZXF1aXNpw6fDtWVzIHBvciBzZWd1bmRvIHZpbmRhcyBkZSBJUHMgbXVuZGlhaXMsIGRlcnJ1YmFuZG8gbyBzZXJ2aWRvci4=", "RERvUw=="],
        ["TyB1c3XDoXJpbyByZWNlYmV1IHVtIGUtbWFpbCBpZMOqbnRpY28gYW8gZG8gYmFuY28gcGVkaW5kbyBhdHVhbGl6YcOnw6NvIGRlIHNlbmhhLg==", "UGhpc2hpbmc="],
        ["QXJxdWl2b3MgZG8gUkggZm9yYW0gYmxvIHF1ZWFkb3MgZSBow6EgdW0gcGVkaWRvIGRlIDIgQml0Y29pbnMu", "UmFuc29td2FyZQ=="],
        ["TyBhdGFjYW50ZSBpbnNlcml1IG8gY29tYW5kbyAnIE9SIDE9MSAtLSBubyBjYW1wbyBkZSBsb2dpbi4=", "U1FMIEluamVjdGlvbg=="],
        ["VW0gc2NyaXB0IG1hbGljaW9zbyBmb2kgaW5qZXRhZG8gZW0gdW0gY29tZW50w6FyaW8gZG8gYmxvZy4=", "WFNT"],
        ["TyBpbnZhc29yIGVzdMOhIHBvc2ljaW9uYWRvIGVudHJlIG8gcm90ZWFkb3IgZSBlIG8gbGFwdG9wLg==", "TUlUTQ=="],
        ["VW0gZXhlY3V0w6F2ZWwgb2N1bHRvIGZvaSBpbnN0YWxhZG8gbm8gc2lzdGVtYSBwYXJhIGVzcGlvbmFyLg==", "TWFsd2FyZQ=="],
        ["TyBjcmltaW5vc28gbGlnb3UgcGFyYSBhIHNlY3JldMOhcmlhIGZpbmdpbmRvIHNlciBkbyBzdXBvcnRlLg==", "RW5nZW5oYXJpYSBTb2NpYWw="],
        ["QSBlbXByZXNhIGZvaSBpbnZhZGlkYSBhdHJhdsOpcyBkZSB1bWEgZmFsaGEgZGVzY29iZXJ0YSBob2plLg==", "WmVyby1EYXk="],
        ["TWlsaGFyZXMgZGUgZGlzcG9zaXRpdm9zIElvVCBpbmZlY3RhZG9zIGVzdMOjbyBzZW5kbyBjb250cm9sYWRvcy4=", "Qm90bmV0"]
    ];

    let _0xidx = 0, _0xhits = 0;

    // Função de decodificação UTF-8 robusta
    const _0xdec = (str) => {
        return decodeURIComponent(atob(str).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
    };

    const _0xallNames = _0xdb.map(i => _0xdec(i[1]));

    function _0xrender() {
        if (_0xidx >= _0xdb.length) {
            document.getElementById('qa').style.display = 'none';
            document.getElementById('f-s').style.display = 'block';
            document.getElementById('f-m').innerText = `RESULT: ${_0xhits} / 10 SECURITY_MATCHES.`;
            return;
        }

        const _0xdata = _0xdb[_0xidx];
        document.getElementById('evd').innerText = `"${_0xdec(_0xdata[0])}"`;
        document.getElementById('cnt').innerText = `THREAT_NODE: ${_0xidx + 1} / 10`;
        document.getElementById('pg').style.width = ((_0xidx / _0xdb.length) * 100) + '%';

        const _0xbox = document.getElementById('opt');
        _0xbox.innerHTML = "";

        let _0xopts = [_0xdec(_0xdata[1])];
        while (_0xopts.length < 4) {
            let _0xrnd = _0xallNames[Math.floor(Math.random() * _0xallNames.length)];
            if (!_0xopts.includes(_0xrnd)) _0xopts.push(_0xrnd);
        }
        _0xopts.sort(() => Math.random() - 0.5);

        _0xopts.forEach(_0xtxt => {
            const _0xbtn = document.createElement('button');
            _0xbtn.className = 'option-btn';
            _0xbtn.innerText = _0xtxt;
            _0xbtn.onclick = () => {
                const _0xans = _0xdec(_0xdata[1]);
                const _0xbtns = document.querySelectorAll('.option-btn');
                _0xbtns.forEach(b => b.disabled = true);

                if (_0xtxt === _0xans) {
                    _0xbtn.classList.add('correct');
                    _0xhits++;
                    document.getElementById('sc').innerText = `HITS: ${_0xhits}`;
                } else {
                    _0xbtn.classList.add('wrong');
                    _0xbtns.forEach(b => { if(b.innerText === _0xans) b.classList.add('correct'); });
                }
                setTimeout(() => { _0xidx++; _0xrender(); }, 1500);
            };
            _0xbox.appendChild(_0xbtn);
        });
    }

    _0xrender();
})();
</script>
</body>
</html>
