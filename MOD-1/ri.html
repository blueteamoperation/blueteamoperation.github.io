<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEC_RESPONSE_LAB</title>
    <style>
        :root { --p: #2ea043; --b: #0d1117; --c: #161b22; --br: #30363d; --t: #e6edf3; }
        body { font-family: 'Consolas', monospace; background-color: var(--b); color: var(--t); padding: 20px; }
        h2 { color: var(--p); text-align: center; text-transform: uppercase; }
        .container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .options { flex: 1; min-width: 250px; background: var(--c); padding: 15px; border-radius: 8px; border: 1px solid var(--br); height: fit-content; position: sticky; top: 20px; }
        .phase-card { background: #21262d; border: 1px solid var(--br); padding: 10px; margin: 8px 0; cursor: grab; border-radius: 4px; text-align: center; font-weight: bold; font-size: 0.85rem; }
        .scenarios { flex: 2; min-width: 400px; }
        .scenario-item { background: var(--c); margin-bottom: 12px; padding: 15px; border-radius: 8px; border: 1px solid var(--br); display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .drop-zone { width: 180px; min-height: 40px; border: 2px dashed #444; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #555; background: var(--b); }
        .drop-zone.over { border-color: var(--p); background: #1c2128; }
        button { display: block; margin: 30px auto; padding: 12px 40px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: bold; }
        .correct { border-color: var(--p) !important; background: #122616 !important; }
        .incorrect { border-color: #f85149 !important; background: #2a1215 !important; }
    </style>
</head>
<body>

    <h2>INCIDENT_RESPONSE_SIMULATOR</h2>
    <p style="text-align: center; font-size: 0.8rem; color: #8b949e;">// Classifique os eventos arrastando as fases para os campos à direita.</p>

    <div class="container">
        <div class="options" id="opt-container">
            <!-- Gerado via JS -->
        </div>
        <div class="scenarios" id="quiz-container">
            <!-- Gerado via JS -->
        </div>
    </div>

    <button id="v-btn">VALIDATE_SYSTEM_INTEGRITY</button>

    <script>
    (function(){
        // Fases reais
        const _F = ["PREPARAÇÃO", "IDENTIFICAÇÃO", "CONTENÇÃO", "ERRADICAÇÃO", "RECUPERAÇÃO", "LIÇÕES APRENDIDAS"];
        
        // Dados das questões (O texto está limpo para evitar erro de encoding, a resposta é o índice da fase acima)
        const _D = [
            { id: 1, t: "Equipe recebe alerta do EDR indicando comportamento suspeito.", a: 1 },
            { id: 2, t: "O analista isola o servidor comprometido da rede.", a: 2 },
            { id: 3, t: "Equipe remove o malware e contas maliciosas criadas.", a: 3 },
            { id: 4, t: "Backups são restaurados e os serviços validados.", a: 4 },
            { id: 5, t: "Organização realiza treinamento de conscientização e atualiza o plano.", a: 5 },
            { id: 6, t: "Equipe analisa logs e confirma que se trata de Ransomware.", a: 1 },
            { id: 7, t: "Relatório detalhado sobre o impacto e o que precisa melhorar.", a: 5 },
            { id: 8, t: "Regras de firewall aplicadas para bloquear IPs do atacante.", a: 2 },
            { id: 9, t: "TI monitora sistemas para garantir que não há mais atividade maliciosa.", a: 4 },
            { id: 10, t: "Definição de papéis, responsabilidades e revisão de contatos.", a: 0 }
        ];

        const oCont = document.getElementById('opt-container');
        const qCont = document.getElementById('quiz-container');

        // Renderizar opções de fases (Esquerda)
        _F.forEach((name, index) => {
            const card = document.createElement('div');
            card.className = 'phase-card';
            card.draggable = true;
            card.innerText = `${index + 1}. ${name}`;
            card.on dragstart = (e) => e.dataTransfer.setData('idx', index);
            oCont.appendChild(card);
        });

        // Renderizar cenários (Direita)
        _D.forEach(item => {
            const row = document.createElement('div');
            row.className = 'scenario-item';
            row.innerHTML = `<span style="font-size:0.9rem;"><strong>${item.id}.</strong> ${item.t}</span>
                             <div class="drop-zone" data-id="${item.id}">DROP_ZONE</div>`;
            qCont.appendChild(row);
        });

        // Lógica de Drop
        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.ondragover = (e) => e.preventDefault();
            zone.ondragenter = function() { this.classList.add('over'); };
            zone.ondragleave = function() { this.classList.remove('over'); };
            zone.ondrop = function(e) {
                e.preventDefault();
                this.classList.remove('over');
                const phaseIdx = e.dataTransfer.getData('idx');
                this.innerHTML = `<div class="phase-card" style="margin:0; width:95%; cursor:default;">${_F[phaseIdx]}</div>`;
                this.dataset.sel = phaseIdx; // Armazena apenas o índice da resposta
            };
        });

        // Validação
        document.getElementById('v-btn').onclick = function() {
            let hits = 0;
            document.querySelectorAll('.drop-zone').forEach(zone => {
                const qId = zone.dataset.id;
                const correctIdx = _D.find(x => x.id == qId).a;
                const userIdx = zone.dataset.sel;

                if (userIdx !== undefined && userIdx == correctIdx) {
                    zone.parentElement.className = 'scenario-item correct';
                    hits++;
                } else {
                    zone.parentElement.className = 'scenario-item incorrect';
                }
            });
            alert(`INTEGRITY_CHECK: ${hits} / ${_D.length} SUCCESS.`);
        };
    })();
    </script>
</body>
</html>
