<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio: Resposta a Incidentes</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #e6edf3; padding: 20px; }
        h2 { color: #2ea043; text-align: center; }
        .container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        
        /* Coluna de Opções */
        .options { flex: 1; min-width: 250px; background: #161b22; padding: 15px; border-radius: 8px; border: 1px solid #30363d; height: fit-content; position: sticky; top: 20px; }
        .phase-card { background: #21262d; border: 1px solid #30363d; padding: 10px; margin: 8px 0; cursor: grab; border-radius: 4px; text-align: center; font-weight: bold; transition: 0.2s; }
        .phase-card:hover { border-color: #2ea043; background: #262c36; }

        /* Coluna de Cenários */
        .scenarios { flex: 2; min-width: 400px; }
        .scenario-item { background: #161b22; margin-bottom: 12px; padding: 15px; border-radius: 8px; border: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; }
        .scenario-text { flex: 1; font-size: 0.95rem; margin-right: 15px; }
        
        /* Espaço para soltar */
        .drop-zone { width: 180px; min-height: 40px; border: 2px dashed #30363d; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: #8b949e; background: #0d1117; }
        .drop-zone.over { border-color: #2ea043; background: #1c2128; }
        .drop-zone .phase-card { margin: 0; width: 90%; cursor: default; }

        button { display: block; margin: 30px auto; padding: 12px 30px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #2ea043; }
        .correct { border-color: #2ea043 !important; background: #122616 !important; }
        .incorrect { border-color: #f85149 !important; background: #2a1215 !important; }
    </style>
</head>
<body>

    <h2>Treinamento: Ciclo de Resposta a Incidentes</h2>
    <p style="text-align: center;">Arraste as fases da esquerda e solte-as no cenário correspondente à direita.</p>

    <div class="container">
        <div class="options" id="phases">
            <div class="phase-card" draggable="true" data-phase="PREPARAÇÃO">1. PREPARAÇÃO</div>
            <div class="phase-card" draggable="true" data-phase="IDENTIFICAÇÃO">2. IDENTIFICAÇÃO</div>
            <div class="phase-card" draggable="true" data-phase="CONTENÇÃO">3. CONTENÇÃO</div>
            <div class="phase-card" draggable="true" data-phase="ERRADICAÇÃO">4. ERRADICAÇÃO</div>
            <div class="phase-card" draggable="true" data-phase="RECUPERAÇÃO">5. RECUPERAÇÃO</div>
            <div class="phase-card" draggable="true" data-phase="LIÇÕES APRENDIDAS">6. LIÇÕES APRENDIDAS</div>
        </div>

        <div class="scenarios" id="quiz">
            </div>
    </div>

    <button onclick="checkAnswers()">Verificar Respostas</button>

    <script>
        const data = [
            { id: 1, text: "Equipe recebe alerta do EDR indicando comportamento suspeito.", answer: "IDENTIFICAÇÃO" },
            { id: 2, text: "O analista isola o servidor comprometido da rede.", answer: "CONTENÇÃO" },
            { id: 3, text: "Equipe remove o malware e contas maliciosas criadas.", answer: "ERRADICAÇÃO" },
            { id: 4, text: "Backups são restaurados e os serviços validados.", answer: "RECUPERAÇÃO" },
            { id: 5, text: "Organização realiza treinamento de conscientização e atualiza o plano.", answer: "LIÇÕES APRENDIDAS" },
            { id: 6, text: "Equipe analisa logs e confirma que se trata de Ransomware.", answer: "IDENTIFICAÇÃO" },
            { id: 7, text: "Relatório detalhado sobre o impacto e o que precisa melhorar.", answer: "LIÇÕES APRENDIDAS" },
            { id: 8, text: "Regras de firewall aplicadas para bloquear IPs do atacante.", answer: "CONTENÇÃO" },
            { id: 9, text: "TI monitora sistemas para garantir que não há mais atividade maliciosa.", answer: "RECUPERAÇÃO" },
            { id: 10, text: "Definição de papéis, responsabilidades e revisão de contatos.", answer: "PREPARAÇÃO" }
        ];

        const quizContainer = document.getElementById('quiz');

        // Criar cenários no HTML
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'scenario-item';
            div.innerHTML = `
                <span class="scenario-text"><strong>${item.id}.</strong> ${item.text}</span>
                <div class="drop-zone" data-id="${item.id}">Arraste aqui</div>
            `;
            quizContainer.appendChild(div);
        });

        // Lógica de Drag and Drop
        let draggedElement = null;

        document.querySelectorAll('.phase-card').forEach(card => {
            card.addEventListener('dragstart', (e) => {
                draggedElement = card;
                e.dataTransfer.setData('text', card.dataset.phase);
            });
        });

        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.addEventListener('dragover', (e) => e.preventDefault());
            zone.addEventListener('dragenter', function() { this.classList.add('over'); });
            zone.addEventListener('dragleave', function() { this.classList.remove('over'); });

            zone.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('over');
                const phase = e.dataTransfer.getData('text');
                this.innerHTML = `<div class="phase-card">${phase}</div>`;
                this.dataset.userAnswer = phase;
            });
        });

        function checkAnswers() {
            let score = 0;
            document.querySelectorAll('.drop-zone').forEach(zone => {
                const scenarioId = zone.dataset.id;
                const correctAnswer = data.find(d => d.id == scenarioId).answer;
                const userAnswer = zone.dataset.userAnswer;

                if (userAnswer === correctAnswer) {
                    zone.parentElement.className = 'scenario-item correct';
                    score++;
                } else {
                    zone.parentElement.className = 'scenario-item incorrect';
                }
            });
            alert(`Você acertou ${score} de ${data.length}!`);
        }
    </script>
</body>
</html>
