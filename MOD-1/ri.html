<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SEC_LAB_V4</title>
    <style>
        :root { --p: #2ea043; --b: #0d1117; --c: #161b22; --br: #30363d; --t: #e6edf3; }
        body { font-family: 'Courier New', monospace; background-color: var(--b); color: var(--t); padding: 20px; }
        .container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .options { flex: 1; min-width: 250px; background: var(--c); padding: 15px; border-radius: 8px; border: 1px solid var(--br); position: sticky; top: 20px; }
        .phase-card { background: #21262d; border: 1px solid var(--br); padding: 10px; margin: 8px 0; cursor: grab; border-radius: 4px; text-align: center; font-weight: bold; }
        .scenarios { flex: 2; min-width: 400px; }
        .scenario-item { background: var(--c); margin-bottom: 12px; padding: 15px; border-radius: 8px; border: 1px solid var(--br); display: flex; align-items: center; justify-content: space-between; }
        .drop-zone { width: 180px; min-height: 45px; border: 2px dashed #444; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #555; }
        .drop-zone.over { border-color: var(--p); background: #1c2128; }
        .btn-v { display: block; margin: 30px auto; padding: 15px 40px; background: var(--p); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .correct { border-color: var(--p) !important; background: #122616 !important; }
        .incorrect { border-color: #f85149 !important; background: #2a1215 !important; }
    </style>
</head>
<body>

    <h2 style="text-align:center; color:var(--p);">INCIDENT_RESPONSE_SIMULATOR</h2>

    <div class="container">
        <div class="options" id="L_OPT"></div>
        <div class="scenarios" id="L_QUIZ"></div>
    </div>

    <button class="btn-v" onclick="V_DATA()">VALIDATE_SYSTEM</button>

    <script>
    (function(){
        const _P = ["PREPARAÇÃO", "IDENTIFICAÇÃO", "CONTENÇÃO", "ERRADICAÇÃO", "RECUPERAÇÃO", "LIÇÕES APRENDIDAS"];
        const _S = [
            { id: 1, t: "Equipe recebe alerta do EDR indicando comportamento suspeito.", a: 1 },
            { id: 2, t: "O analista isola o servidor comprometido da rede.", a: 2 },
            { id: 3, t: "Equipe remove o malware e contas maliciosas criadas.", a: 3 },
            { id: 4, t: "Backups são restaurados e os serviços validados.", a: 4 },
            { id: 5, t: "Organização realiza treinamento de conscientização e atualiza o plano.", a: 5 },
            { id: 6, t: "Equipe analisa logs e confirma que se trata de Ransomware.", a: 1 },
            { id: 7, t: "Relatório detalhado sobre o impacto e o que precisa melhorar.", a: 5 },
            { id: 8, t: "Regras de firewall aplicadas para bloquear IPs do atacante.", a: 2 },
            { id: 9, t: "TI monitora sistemas para garantir que não há mais atividade maliciosa.", a: 4 },
            { id: 10, t: "Definição de papéis, responsabilidades e revisão de contatos.", a: 0 }
        ];

        const oC = document.getElementById('L_OPT');
        const qC = document.getElementById('L_QUIZ');

        // Render Lateral
        _P.forEach((n, i) => {
            const d = document.createElement('div');
            d.className = 'phase-card';
            d.draggable = true;
            d.innerText = n;
            d.addEventListener('dragstart', (e) => { e.dataTransfer.setData('v', i); });
            oC.appendChild(d);
        });

        // Render Scenarios
        _S.forEach(x => {
            const r = document.createElement('div');
            r.className = 'scenario-item';
            r.id = 'ROW_' + x.id;
            r.innerHTML = `<span style="flex:1; font-size:0.9rem; padding-right:10px;"><strong>${x.id}.</strong> ${x.t}</span>
                           <div class="drop-zone" data-id="${x.id}">[ EMPTY ]</div>`;
            qC.appendChild(r);
        });

        // Drag Logic
        document.querySelectorAll('.drop-zone').forEach(z => {
            z.addEventListener('dragover', (e) => e.preventDefault());
            z.addEventListener('dragenter', function(){ this.classList.add('over'); });
            z.addEventListener('dragleave', function(){ this.classList.remove('over'); });
            z.addEventListener('drop', function(e){
                e.preventDefault();
                this.classList.remove('over');
                const idx = e.dataTransfer.getData('v');
                this.innerHTML = `<div class="phase-card" style="margin:0; width:95%;">${_P[idx]}</div>`;
                this.setAttribute('data-u', idx);
            });
        });

        window.V_DATA = function() {
            let hits = 0;
            _S.forEach(s => {
                const z = document.querySelector(`.drop-zone[data-id="${s.id}"]`);
                const u = z.getAttribute('data-u');
                const row = document.getElementById('ROW_' + s.id);
                
                if (u !== null && u == s.a) {
                    row.className = 'scenario-item correct';
                    hits++;
                } else {
                    row.className = 'scenario-item incorrect';
                }
            });
            alert("RESULTADO: " + hits + " / " + _S.length);
        };
    })();
    </script>
</body>
</html>
