<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEC_RESPONSE_SIMULATOR</title>
    <style>
        :root { --p: #2ea043; --b: #0d1117; --c: #161b22; --br: #30363d; --t: #e6edf3; }
        body { font-family: 'Consolas', monospace; background-color: var(--b); color: var(--t); padding: 20px; }
        h2 { color: var(--p); text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        .container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .options { flex: 1; min-width: 250px; background: var(--c); padding: 15px; border-radius: 8px; border: 1px solid var(--br); height: fit-content; position: sticky; top: 20px; }
        .phase-card { background: #21262d; border: 1px solid var(--br); padding: 10px; margin: 8px 0; cursor: grab; border-radius: 4px; text-align: center; font-weight: bold; font-size: 0.85rem; }
        .scenarios { flex: 2; min-width: 400px; }
        .scenario-item { background: var(--c); margin-bottom: 12px; padding: 15px; border-radius: 8px; border: 1px solid var(--br); display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .drop-zone { width: 180px; min-height: 40px; border: 2px dashed #444; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #555; background: var(--b); }
        .drop-zone.over { border-color: var(--p); background: #1c2128; }
        button { display: block; margin: 30px auto; padding: 12px 40px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: bold; }
        .correct { border-color: var(--p) !important; background: #122616 !important; }
        .incorrect { border-color: #f85149 !important; background: #2a1215 !important; }
    </style>
</head>
<body>

    <h2>INCIDENT_RESPONSE_LAB</h2>
    <p style="text-align: center; font-size: 0.8rem; color: #8b949e;">// Classifique os eventos arrastando as fases para os buffers correspondentes.</p>

    <div class="container">
        <div class="options" id="_0x_opt"></div>
        <div class="scenarios" id="_0x_quiz"></div>
    </div>

    <button onclick="_0x_verify()">VALIDATE_RESULTS</button>

    <script>
    (function(){
        // Fases e Respostas Ofuscadas em Base64
        const _0xf = ["UFJFUEFSQcdBTw==", "SURFTlRJRklDQcdBTw==", "Q09OVEVO单位Tw==", "RVJSQURJQ0HHT08=", "UkVDVVBFUkHHT08=", "TEnDh8VFUyBBUFJFTkRJREFT"];
        const _0xd = [
            {id: 1, t: "RXF1aXBlIHJlY2ViZSBhbGVydGEgZG8gRURSIGluZGljYW5kbyBjb21wb3J0YW1lbnRvIHN1c3BlaXRvLg==", a: _0xf[1]},
            {id: 2, t: "TyBhbmFsaXN0YSBpc29sYSBvIHNlcnZpZG9yIGNvbXByb21ldGlkbyBkYSByZWRlLg==", a: _0xf[2]},
            {id: 3, t: "RXF1aXBlIHJlbW92ZSBvIG1hbHdhcmUgZSBjb250YXMgbWFsaWNpb3NhcyBjcmlhZGFzLg==", a: _0xf[3]},
            {id: 4, t: "QmFja3VwcyBzw6NvIHJlc3RhdXJhZG9zIGUgb3Mgc2VydmnDp29zIHZhbGlkYWRvcy4=", a: _0xf[4]},
            {id: 5, t: "T3JnYW5pemHDp8OjbyByZWFsaXphIHRyZWluYW1lbnRvIGRlIGNvbnNjaWVudGl6YcOnw6NvLg==", a: _0xf[5]},
            {id: 6, t: "RXF1aXBlIGFuYWxpc2EgbG9ncyBlIGNvbmZpcm1hIHF1ZSBzZSB0cmF0YSBkZSBSYW5zb213YXJlLg==", a: _0xf[1]},
            {id: 7, t: "UmVsYXTDs3JpbyBkZXRhbGhhZG8gc29icmUgbyBpbXBhY3RvIGUgbyBxdWUgcHJlY2lzYSBtZWxob3Jhci4=", a: _0xf[5]},
            {id: 8, t: "UmVncmFzIGRlIGZpcmV3YWxsIGFwbGljYWRhcyBwYXJhIGJsb3F1ZWFyIElQcyBkbyBhdGFjYW50ZS4=", a: _0xf[2]},
            {id: 9, t: "VEkgbW9uaXRvcmEgc2lzdGVtYXMgcGFyYSBnYXJhbnRpciBxdWUgbsO6byBhow6EIGF0aXZpZGFkZS4=", a: _0xf[4]},
            {id: 10, t: "RGVmaW5pY8Onw6NvIGRlIHBhcMOpaXMsIHJlc3BvbnNhYmlsaWRhZGVzIGUgcmV2aXPDo28u", a: _0xf[0]}
        ];

        const _0xdec = (s) => decodeURIComponent(atob(s).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        const _0x_qC = document.getElementById('_0x_quiz');
        const _0x_oC = document.getElementById('_0x_opt');

        // Renderizar Fases
        _0xf.forEach((ph, i) => {
            const div = document.createElement('div');
            div.className = 'phase-card';
            div.draggable = true;
            div.dataset.p = ph;
            div.innerText = `${i+1}. ${_0xdec(ph)}`;
            div.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', ph));
            _0x_oC.appendChild(div);
        });

        // Renderizar Quests
        _0xd.forEach(it => {
            const div = document.createElement('div');
            div.className = 'scenario-item';
            div.innerHTML = `<span style="font-size:0.9rem;"><strong>${it.id}.</strong> ${_0xdec(it.t)}</span><div class="drop-zone" data-id="${it.id}">BUFFER_EMPTY</div>`;
            _0x_qC.appendChild(div);
        });

        document.querySelectorAll('.drop-zone').forEach(z => {
            z.addEventListener('dragover', (e) => e.preventDefault());
            z.addEventListener('dragenter', function() { this.classList.add('over'); });
            z.addEventListener('dragleave', function() { this.classList.remove('over'); });
            z.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('over');
                const p = e.dataTransfer.getData('text');
                this.innerHTML = `<div class="phase-card" style="margin:0; width:95%;">${_0xdec(p)}</div>`;
                this.dataset.ans = p;
            });
        });

        window._0x_verify = function() {
            let s = 0;
            document.querySelectorAll('.drop-zone').forEach(z => {
                const id = z.dataset.id;
                const correct = _0xd.find(item => item.id == id).a;
                if (z.dataset.ans === correct) {
                    z.parentElement.className = 'scenario-item correct';
                    s++;
                } else {
                    z.parentElement.className = 'scenario-item incorrect';
                }
            });
            alert(`ANALYSIS_COMPLETE: ${s} / ${_0xd.length} ALIGNED.`);
        };
    })();
    </script>
</body>
</html>
