<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Infiltration_Simulator_v9</title>
    <style>
        :root { --n-g: #00ff9d; --n-b: #00d4ff; --bg: #050a0e; --c-bg: #1a242d; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .header-box { text-align: center; border: 1px solid var(--n-b); padding: 20px; border-radius: 10px; width: 100%; max-width: 850px; background: rgba(0, 212, 255, 0.05); }
        .header-box h1 { margin: 0; color: var(--n-b); letter-spacing: 4px; font-size: 1.4rem; }
        
        .mission-log { margin: 20px 0; padding: 20px; background: #0c1218; border-left: 5px solid var(--n-g); width: 100%; max-width: 850px; font-size: 0.9rem; line-height: 1.5; }
        
        .vectors-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 12px; width: 100%; max-width: 850px; margin-top: 10px; }
        
        .v-card { background: var(--c-bg); border: 1px solid #2a343d; padding: 15px; border-radius: 4px; text-align: center; cursor: pointer; transition: 0.2s; }
        .v-card:hover { border-color: var(--n-g); background: #232d36; }
        .v-card.sel { border-color: var(--n-g); box-shadow: 0 0 10px rgba(0, 255, 157, 0.3); background: #0c1218; }
        .v-card strong { color: var(--n-g); display: block; margin-bottom: 5px; font-size: 0.8rem; }
        .v-card small { color: #888; font-size: 0.7rem; }

        .s-bar { width: 100%; max-width: 850px; height: 4px; background: #111; border-radius: 2px; margin-top: 30px; }
        .fill { height: 100%; width: 0%; background: var(--n-g); transition: 0.6s; box-shadow: 0 0 10px var(--n-g); }

        .btn-exe { margin-top: 30px; padding: 15px 60px; background: transparent; color: var(--n-g); border: 1px solid var(--n-g); border-radius: 3px; font-weight: bold; cursor: pointer; font-family: inherit; transition: 0.3s; }
        .btn-exe:hover:not(:disabled) { background: var(--n-g); color: #000; }
        .btn-exe:disabled { color: #333; border-color: #222; cursor: not-allowed; }

        #console-msg { margin-top: 20px; font-size: 0.8rem; height: 20px; color: #666; }
    </style>
</head>
<body>

<div class="header-box">
    <h1>INF_VECTOR_SIMULATOR_V.9</h1>
    <p style="font-size:0.7rem; color: #555;">// Selecione o vetor de intrusão apropriado para o cenário.</p>
</div>

<div class="mission-log" id="_m_box">
    <span style="color:var(--n-g)">[OBJETIVO_ATUAL]:</span> <span id="_target">Iniciando conexão...</span>
</div>

<div class="vectors-grid" id="_v_grid"></div>

<div class="s-bar"><div class="fill" id="_prog"></div></div>
<div id="console-msg">Aguardando entrada de comando...</div>
<button class="btn-exe" id="_exec" onclick="_proc()" disabled>EXECUTE_ATTACK</button>

<script>
(function(){
    // Vetores e Cenários protegidos por referência de índice
    const _V = [
        ["Phishing", "E-mails/sites fraudulentos"], ["Malware", "Código malicioso/Payloads"], 
        ["Vulnerabilidade", "Exploração de falhas de SO"], ["Engenharia Social", "Manipulação de usuários"],
        ["Credenciais", "Brute Force/Senhas fracas"], ["Web Attack", "SQLi / XSS"],
        ["Rede/Comunicação", "MITM / Wi-Fi Vulnerável"], ["Removíveis", "BadUSB / Pendrives"],
        ["Insider Threat", "Ameaças internas"], ["Físico", "Acesso local/Hardware"]
    ];

    const _S = [
        { t: "OBJETIVO 1: O roteador da recepção utiliza criptografia WEP obsoleta. Qual o vetor de entrada?", c: 6, l: "NETWORK_BREACH_SUCCESS: Tráfego capturado." },
        { t: "OBJETIVO 2: Servidor interno localizado. O login do admin é 'admin' e a senha 'admin123'. Qual o vetor?", c: 4, l: "AUTH_BYPASS_SUCCESS: Credenciais fracas identificadas." },
        { t: "OBJETIVO 3: Necessário infectar a estação de um VIP isolado. Você planta um drive USB na mesa dele.", c: 7, l: "PAYLOAD_DELIVERY_SUCCESS: Dispositivo montado no host." },
        { t: "OBJETIVO FINAL: O banco de dados não valida a entrada em campos de pesquisa (aspas simples permitidas).", c: 5, l: "DATA_EXFILTRATION_COMPLETE: SQL_Injection executado." }
    ];

    let _curr = 0, _sel = null;
    const g = document.getElementById('_v_grid');
    const msg = document.getElementById('console-msg');

    // Init Grid
    _V.forEach((v, i) => {
        const c = document.createElement('div');
        c.className = 'v-card';
        c.innerHTML = `<strong>${v[0]}</strong><small>${v[1]}</small>`;
        c.onclick = () => {
            document.querySelectorAll('.v-card').forEach(x => x.classList.remove('sel'));
            c.classList.add('sel');
            _sel = i;
            document.getElementById('_exec').disabled = false;
        };
        g.appendChild(c);
    });

    document.getElementById('_target').innerText = _S[0].t;

    window._proc = function() {
        const s = _S[_curr];
        if (_sel === s.c) {
            _curr++;
            msg.innerText = `>> ${s.l}`;
            msg.style.color = "var(--n-g)";
            document.getElementById('_prog').style.width = (_curr / _S.length) * 100 + "%";

            if (_curr < _S.length) {
                setTimeout(() => {
                    document.getElementById('_target').innerText = _S[_curr].t;
                    _sel = null;
                    document.querySelectorAll('.v-card').forEach(x => x.classList.remove('sel'));
                    document.getElementById('_exec').disabled = true;
                    msg.innerText = "Aguardando novo vetor...";
                    msg.style.color = "#666";
                }, 1200);
            } else {
                document.getElementById('_m_box').innerHTML = "<h2 style='color:var(--n-g); text-align:center;'>[!!!] SISTEMA TOTALMENTE COMPROMETIDO [!!!]</h2>";
                document.getElementById('_exec').style.display = "none";
            }
        } else {
            msg.innerText = ">> DETECTION_ERROR: Vetor bloqueado pelo Firewall/IDS.";
            msg.style.color = "#ff4444";
        }
    };
})();
</script>
</body>
</html>
