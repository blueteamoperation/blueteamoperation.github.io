<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intell Lab - IoC vs IoA</title>
    <style>
        :root {
            --bg-color: #050505;
            --container-bg: #0c0b0a;
            --accent-color: #ff6600; /* Laranja Cyberpunk */
            --accent-glow: rgba(255, 102, 0, 0.3);
            --text-gray: #b3b3b3;
            --border-color: #3a1a00;
            --terminal-orange: #ff8833;
        }

        body {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg-color);
            color: var(--text-gray);
            line-height: 1.6;
        }

        /* Efeito de Scanline de Monitor Antigo */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(255, 102, 0, 0.02), rgba(0, 0, 0, 0.02), rgba(255, 102, 0, 0.02));
            z-index: 9999;
            pointer-events: none;
            background-size: 100% 4px, 3px 100%;
        }

        /* BANNER */
        .header-banner {
            width: 100%;
            height: 350px;
            overflow: hidden;
            border-bottom: 3px solid var(--accent-color);
            position: relative;
            background: #000;
        }

        .header-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(140%) brightness(30%) sepia(100%) hue-rotate(-15deg) saturate(500%);
        }

        /* CONTAINER */
        .container {
            max-width: 900px;
            margin: -50px auto 50px;
            padding: 40px;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        /* TÍTULO PRINCIPAL */
        h1.main-title {
            color: var(--accent-color);
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .status-bar {
            font-size: 10px;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
        }

        /* SEÇÕES */
        .section {
            margin-bottom: 15px;
            border: 1px solid transparent;
            transition: border 0.3s ease;
        }

        .section.active {
            border: 1px solid rgba(255, 102, 0, 0.2);
            background: rgba(255, 102, 0, 0.01);
        }

        .section h2 {
            font-size: 14px;
            color: var(--accent-color);
            background: rgba(255, 102, 0, 0.05);
            padding: 12px 15px;
            border-left: 4px solid var(--accent-color);
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0;
            cursor: pointer;
            user-select: none;
            transition: background 0.3s;
        }

        .section h2:hover {
            background: rgba(255, 102, 0, 0.15);
        }

        .section h2::after {
            content: "[ + ]";
            font-size: 12px;
            opacity: 0.7;
            font-family: monospace;
        }

        .section.active h2::after {
            content: "[ - ]";
            color: var(--terminal-orange);
        }

        /* RESOLUÇÃO DOS CONTEÚDOS OCULTOS */
        .section-wrapper {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-out;
            overflow: hidden;
        }

        .section.active > .section-wrapper {
            grid-template-rows: 1fr;
        }

        .section-content {
            min-height: 0;
            padding: 0 15px;
            transition: padding 0.3s ease-out;
        }

        .section.active > .section-wrapper > .section-content {
            padding: 15px 15px;
        }

        /* LINKS / LISTA */
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            margin: 12px 0;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 5px;
        }

        li::before {
            content: "> ";
            color: var(--accent-color);
        }

        a {
            text-decoration: none;
            color: #eee;
            transition: 0.3s;
            font-size: 14px;
        }

        a:hover {
            color: var(--accent-color);
            padding-left: 10px;
            text-shadow: 0 0 8px rgba(255, 102, 0, 0.6);
        }

        /* FOOTER */
        .footer {
            text-align: center;
            font-size: 10px;
            color: #553311;
            margin-top: 60px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .id-badge {
            font-size: 10px;
            color: #555;
            position: absolute;
            top: 10px;
            right: 10px;
        }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>[ Threat Lab: Prática de IOC e IOA ]</h1>
    </header>

    <div class="score-board">
        <div>STATUS: VALIDANDO ARTEFATOS</div>
        <div>SCORE: <span id="score" class="score">0</span> / <span id="total">0</span></div>
    </div>

    <div class="matrix-grid" id="matrix-container">
        </div>
</div>

<script>
// Base de dados exatamente igual ao texto fornecido
const dataset = [
    // --- IOCs ---
    { id: 1, type: "IOC", name: "1. Hash malicioso", desc: "MD5/SHA-256 de um ransomware conhecido." },
    { id: 2, type: "IOC", name: "2. Endereço IP malicioso", desc: "Comunicação com 185.220.101.45 (C2)." },
    { id: 3, type: "IOC", name: "3. Domínio malicioso", desc: "update-security-fake-check.com." },
    { id: 4, type: "IOC", name: "4. URL maliciosa", desc: "Download realizado em /payload.exe malicioso." },
    { id: 5, type: "IOC", name: "5. Arquivo suspeito", desc: "invoice.exe localizado em %TEMP%." },
    { id: 6, type: "IOC", name: "6. Chave de Registro", desc: "Alteração chave HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\\malware." },
    { id: 7, type: "IOC", name: "7. Processo conhecido", desc: "mimikatz.exe encontrado na memória." },
    { id: 8, type: "IOC", name: "8. Assinatura YARA", desc: "Regra Yara identifica uma família de malware." },
    { id: 9, type: "IOC", name: "9. Certificado digital", desc: "Certificado associado a malware conhecido." },
    { id: 10, type: "IOC", name: "10. E-mail malicioso", desc: "Remetente ou assunto identificado em campanha de phishing." },

    // --- IOAs ---
    { id: 11, type: "IOA", name: "1. PowerShell ofuscado", desc: "powershell -enc ... sendo executado." },
    { id: 12, type: "IOA", name: "2. Movimento lateral", desc: "Uso inesperado de PsExec, SMB ou WMI entre hosts." },
    { id: 13, type: "IOA", name: "3. Brute Force", desc: "Centenas de tentativas de login seguidas de sucesso." },
    { id: 14, type: "IOA", name: "4. Criação de usuário", desc: "Novo usuário administrador criado fora do horário normal." },
    { id: 15, type: "IOA", name: "5. Dump de credenciais", desc: "Execução do LSASS Dump ou acesso suspeito ao processo LSASS." },
    { id: 16, type: "IOA", name: "6. Persistência", desc: "Criação de tarefa agendada ou serviço desconhecido." },
    { id: 17, type: "IOA", name: "7. Desativação de segurança", desc: "Tentativa de parar o Defender, EDR ou antivírus." },
    { id: 18, type: "IOA", name: "8. Exfiltração", desc: "Grande volume de dados enviado para IP externo." },
    { id: 19, type: "IOA", name: "9. Descoberta do ambiente", desc: "Execução sequencial de whoami, ipconfig, net user, net group, netstat." },
    { id: 20, type: "IOA", name: "10. Execução incomum", desc: "cmd.exe iniciado por winword.exe ou excel.exe após abrir um documento." }
];

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function initLab() {
    const container = document.getElementById('matrix-container');
    const randomizedData = shuffle([...dataset]);
    document.getElementById('total').innerText = randomizedData.length;

    randomizedData.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'challenge-card';
        card.id = `card-${item.id}`;

        card.innerHTML = `
            <div class="meta">
                <span>ITEM #${index + 1}</span>
                <span>${item.name}</span>
            </div>
            <div class="artifact-box"><code>${item.desc}</code></div>
            <div class="btn-group" id="actions-${item.id}">
                <button class="btn-ioc" onclick="validate(${item.id}, 'IOC')">IOC</button>
                <button class="btn-ioa" onclick="validate(${item.id}, 'IOA')">IOA</button>
            </div>
            <div class="feedback-msg" id="feed-${item.id}"></div>
        `;
        container.appendChild(card);
    });
}

let currentScore = 0;

function validate(id, selected) {
    const targetItem = dataset.find(i => i.id === id);
    const card = document.getElementById(`card-${id}`);
    const feedback = document.getElementById(`feed-${id}`);
    const actions = document.getElementById(`actions-${id}`);
    
    const buttons = actions.getElementsByTagName('button');
    buttons[0].disabled = true;
    buttons[1].disabled = true;

    feedback.classList.add('show');

    if (selected === targetItem.type) {
        card.classList.add('correct');
        feedback.style.color = "var(--success)";
        feedback.innerHTML = `[+] Correto!`;
        currentScore++;
        document.getElementById('score').innerText = currentScore;
    } else {
        card.classList.add('wrong');
        feedback.style.color = "var(--magenta)";
        feedback.innerHTML = `[-] Incorreto. Resposta certa: ${targetItem.type}`;
    }
}

window.onload = initLab;
</script>

</body>
</html>
