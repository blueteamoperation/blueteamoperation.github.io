<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB: Análise de Ofuscação e Encodings</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #00ff66;
            --border-color: #30363d;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-color);
            margin: 0;
            font-size: 1.6rem;
            text-transform: uppercase;
        }

        .challenge-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h2 {
            color: #fff;
            margin-top: 0;
            font-size: 1.1rem;
            border-left: 3px solid var(--accent-color);
            padding-left: 10px;
        }

        textarea {
            width: 100%;
            background-color: #090d13;
            color: #e6edf3;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            resize: vertical;
            box-sizing: border-box;
            white-space: pre;
            overflow-x: auto;
        }

        .btn-copy {
            background-color: #21262d;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 12px;
            transition: all 0.2s ease;
        }

        .btn-copy:hover {
            background-color: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Cyber Defense Lab - Análise Estática de Encodings</h1>
    </header>

    <!-- CARD 1: ENCODE HEX -->

        <textarea id="code-hex" rows="3" readonly>\x48\x34\x63\x6b\x65\x64\x20\x42\x79\x20\x53\x69\x6c\x76\x61\x6f</textarea>

<script>
    function copyText(id, button) {
        const textArea = document.getElementById(id);
        textArea.select();
        textArea.setSelectionRange(0, 99999);

        navigator.clipboard.writeText(textArea.value).then(() => {
            const originalText = button.innerText;
            button.innerText = "✓ Copiado!";
            button.style.backgroundColor = "var(--accent-color)";
            button.style.color = "#000";

            setTimeout(() => {
                button.innerText = originalText;
                button.style.backgroundColor = "";
                button.style.color = "";
            }, 2000);
        }).catch(err => {
            console.error('Erro ao copiar: ', err);
        });
    }
</script>

</body>
</html>
