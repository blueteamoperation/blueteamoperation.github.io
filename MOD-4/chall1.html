<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BlueTeam Wiki - Splunk Filters V3</title>
    <style>
        :root {
            --bg-dark: #05070a;
            --card-bg: #0d1117;
            --cyan: #00d4ff;
            --magenta: #ff00ff;
            --text-main: #e6edf3;
            --text-dim: #7d8590;
            --border: #30363d;
            --green: #238636;
            --purple: #8957e5;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Consolas', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
        }

        .header {
            border-bottom: 2px solid var(--cyan);
            margin-bottom: 30px;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 { color: var(--cyan); text-transform: uppercase; letter-spacing: 2px; margin: 0; font-size: 26px; text-shadow: 0 0 10px rgba(0,212,255,0.3); }

        #searchBar {
            width: 100%;
            padding: 15px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--cyan);
            font-size: 14px;
            margin-bottom: 25px;
            outline: none;
            box-sizing: border-box;
        }

        #searchBar:focus { border-color: var(--magenta); box-shadow: 0 0 5px var(--magenta); }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover { border-color: var(--cyan); }

        .card.active-copy {
            border-color: var(--magenta) !important;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
        }

        .badge {
            font-size: 10px;
            padding: 2px 8px;
            font-weight: bold;
            margin-bottom: 12px;
            align-self: flex-start;
            color: #fff;
            text-transform: uppercase;
        }

        .badge-basic { background: var(--green); }
        .badge-stats { background: #1f6feb; }
        .badge-adv { background: var(--purple); }

        .cmd-box {
            background: #000;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #111;
            margin: 10px 0;
        }

        .cmd-box:hover { background: #050505; border-color: #444; }

        .cmd-text {
            color: #a5d6ff;
            font-size: 12px;
            word-break: break-all;
            user-select: all; /* Facilita seleção manual se o clique falhar */
        }

        .status-msg {
            font-size: 10px;
            color: var(--cyan);
            font-weight: bold;
            height: 14px;
            text-transform: uppercase;
        }

        .desc { 
            font-size: 13px; 
            color: var(--text-dim); 
            margin-top: 10px; 
            line-height: 1.4;
            border-top: 1px dashed #333;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>WIKI // SPLUNK FILTERS</h1>
        <div style="color: var(--magenta); font-size: 11px;">SRC: vpn_data_30k.json</div>
    </div>

    <input type="text" id="searchBar" placeholder="> FILTRAR COMANDO (EX: STATS, REGEX, USER)..." onkeyup="filterWiki()">

    <div class="filter-grid" id="wikiGrid"></div>

    <script>
        const filters = [
            { cat: 'basic', cmd: 'index=* source="vpn_data_30k.json" user="silvio.pro"', desc: 'Filtra logs do usuário Silvio.' },
            { cat: 'basic', cmd: 'index=* source="vpn_data_30k.json" status="authentication_failure"', desc: 'Apenas falhas de login.' },
            { cat: 'basic', cmd: 'index=* source="vpn_data_30k.json" location.country="Japan"', desc: 'Acessos vindos do Japão.' },
            { cat: 'basic', cmd: 'index=* source="vpn_data_30k.json" | table _time, user, src_ip, status', desc: 'Tabela limpa de eventos.' },
            { cat: 'basic', cmd: 'index=* source="vpn_data_30k.json" NOT user="admin"', desc: 'Exclui conta administrativa.' },
            { cat: 'basic', cmd: 'index=* source="vpn_data_30k.json" session_info.device_os="*Windows*"', desc: 'Filtra qualquer SO Windows.' },
            { cat: 'basic', cmd: 'index=* source="vpn_data_30k.json" src_ip="192.168.*"', desc: 'Filtra rede interna.' },
            { cat: 'basic', cmd: 'index=* source="vpn_data_30k.json" | head 20', desc: 'Amostra dos 20 logs mais recentes.' },
            { cat: 'basic', cmd: 'index=* source="vpn_data_30k.json" status="session_start"', desc: 'Apenas conexões iniciadas.' },
            { cat: 'basic', cmd: 'index=* source="vpn_data_30k.json" | fields user, status, location.city', desc: 'Limita colunas para performance.' },

            { cat: 'stats', cmd: 'index=* source="vpn_data_30k.json" | stats count by user', desc: 'Volume de eventos por usuário.' },
            { cat: 'stats', cmd: 'index=* source="vpn_data_30k.json" | stats count by location.country', desc: 'Acessos por país.' },
            { cat: 'stats', cmd: 'index=* source="vpn_data_30k.json" | stats avg(session_info.duration_minutes)', desc: 'Média de tempo conectado.' },
            { cat: 'stats', cmd: 'index=* source="vpn_data_30k.json" | stats sum(session_info.duration_minutes) by user', desc: 'Soma total de minutos/usuário.' },
            { cat: 'stats', cmd: 'index=* source="vpn_data_30k.json" | top limit=5 src_ip', desc: 'Top 5 IPs de origem.' },
            { cat: 'stats', cmd: 'index=* source="vpn_data_30k.json" | timechart count by status', desc: 'Gráfico temporal de status.' },
            { cat: 'stats', cmd: 'index=* source="vpn_data_30k.json" | stats max(session_info.duration_minutes)', desc: 'Duração máxima registrada.' },
            { cat: 'stats', cmd: 'index=* source="vpn_data_30k.json" | stats count(eval(status="authentication_failure")) as total_falhas', desc: 'Contagem total de falhas.' },

            { cat: 'adv', cmd: 'index=* source="vpn_data_30k.json" | regex user="^[a-z]+\\.[a-z]+$"', desc: 'Regex: Formato nome.sobrenome.' },
            { cat: 'adv', cmd: 'index=* source="vpn_data_30k.json" | where \'session_info.duration_minutes\' > 300', desc: 'Filtro: Sessões > 5 horas.' },
            { cat: 'adv', cmd: 'index=* source="vpn_data_30k.json" | iplocation src_ip | stats count by Country', desc: 'Geolocalização de IPs.' },
            { cat: 'adv', cmd: 'index=* source="vpn_data_30k.json" | eventstats avg(session_info.duration_minutes) as m_glob | where \'session_info.duration_minutes\' > m_glob', desc: 'Filtra sessões acima da média global.' },
        ];

        function render(data) {
            const grid = document.getElementById('wikiGrid');
            grid.innerHTML = data.map((f, i) => `
                <div class="card" id="card-${i}">
                    <span class="badge badge-${f.cat}">${f.cat}</span>
                    <div class="cmd-box" onclick="copyCmd(this, ${i})">
                        <code class="cmd-text">${f.cmd}</code>
                    </div>
                    <span class="status-msg" id="status-${i}">CLIQUE PARA COPIAR</span>
                    <div class="desc">${f.desc}</div>
                </div>
            `).join('');
        }

        function copyCmd(el, id) {
            // Pega apenas o texto do elemento <code> interno
            const text = el.querySelector('.cmd-text').innerText;
            
            navigator.clipboard.writeText(text).then(() => {
                const card = document.getElementById(`card-${id}`);
                const status = document.getElementById(`status-${id}`);
                
                card.classList.add('active-copy');
                status.innerText = "✓ COPIADO!";
                status.style.color = "var(--magenta)";

                setTimeout(() => {
                    card.classList.remove('active-copy');
                    status.innerText = "CLIQUE PARA COPIAR";
                    status.style.color = "var(--cyan)";
                }, 1500);
            });
        }

        function filterWiki() {
            const val = document.getElementById('searchBar').value.toLowerCase();
            const filtered = filters.filter(f => 
                f.cmd.toLowerCase().includes(val) || 
                f.desc.toLowerCase().includes(val)
            );
            render(filtered);
        }

        render(filters);
    </script>
</body>
</html>
