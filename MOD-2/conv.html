<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BlueTeamOps | Binary Decoder Lab</title>
    <style>
        :root { --bg: #0a0a0a; --cyan: #00ffff; --orange: #ff6600; --border: #1a3a3a; }
        body { margin: 0; font-family: 'Courier New', monospace; background: var(--bg); color: #a0a0a0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .terminal-box { background: #0f0f0f; padding: 30px; border: 1px solid var(--border); width: 90%; max-width: 550px; text-align: center; }
        .binary-stream { font-size: 1.2rem; background: #000; padding: 20px; margin: 20px 0; color: #fff; border: 1px solid var(--cyan); }
        input { background: #000; border: 1px solid var(--border); color: var(--cyan); padding: 12px; width: 65px; text-align: center; font-size: 1.2rem; margin: 5px; outline: none; }
        .btn-analyze { background: transparent; color: var(--orange); border: 1px solid var(--orange); padding: 15px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        #output { margin-top: 20px; min-height: 50px; font-weight: bold; }
        .success { color: #00ff41; border: 1px solid #00ff41; padding: 10px; background: rgba(0, 255, 65, 0.05); }
        .error { color: #ff3131; }
    </style>
</head>
<body>

    <div class="terminal-box">
        <h2 style="color: var(--orange);">[ANALYSIS_LAB_02]</h2>
        <p>Converta os octetos binários abaixo para extrair o IP do servidor C2.</p>

        <div class="binary-stream">11000000 . 10101000 . 00001010 . 01100100</div>
        
        <div class="input-wrapper">
            <input type="text" maxlength="3" id="q1" placeholder="000"> .
            <input type="text" maxlength="3" id="q2" placeholder="000"> .
            <input type="text" maxlength="3" id="q3" placeholder="000"> .
            <input type="text" maxlength="3" id="q4" placeholder="000">
        </div>
        
        <button class="btn-analyze" onclick="_run()">Executar Decode</button>
        <div id="output"></div>
    </div>

    <script>
        function _run() {
            const out = document.getElementById('output');
            // Captura os valores digitados pelo aluno
            const v = [
                document.getElementById('q1').value,
                document.getElementById('q2').value,
                document.getElementById('q3').value,
                document.getElementById('q4').value
            ];
            
            // Transforma em números para o cálculo
            const n = v.map(x => parseInt(x) || 0);

            // Lógica de Checksum (Gabarito: 192, 168, 10, 100)
            // Peso: 13, 7, 5, 3. Soma esperada: 4022 (0xFB6)
            // XOR check: 192 ^ 85 = 149 (0x95)
            const ck = (n[0] * 13) + (n[1] * 7) + (n[2] * 5) + (n[3] * 3);
            const valid = (ck === 0xFB6 && (n[0] ^ 85) === 149);

            if(valid) {
                // AQUI ESTÁ A MUDANÇA: O IP é montado com o que ele digitou (v[0].v[1]...)
                // Se ele chegou aqui, é porque os números que ele digitou são os corretos.
                out.innerHTML = `<div class='success'>DATA_MATCH: IP ${v[0]}.${v[1]}.${v[2]}.${v[3]} IDENTIFICADO.<br>SESSÃO ENCERRADA.</div>`;
            } else {
                out.innerHTML = "<div class='error'>CHECKSUM_ERROR: Falha na integridade dos dados.</div>";
            }
        }

        // Bloqueia letras
        document.querySelectorAll('input').forEach(el => {
            el.addEventListener('input', function() { this.value = this.value.replace(/[^0-9]/g, ''); });
        });
    </script>
</body>
</html>
