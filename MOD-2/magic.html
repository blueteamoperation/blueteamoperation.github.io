<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sytem-Security-Check | Forensic Lab</title>
    <style>
        :root { --cyber-blue: #00d4ff; --cyber-yellow: #ffca28; --bg: #05080a; --card: #10141b; }
        body { font-family: 'Consolas', monospace; background: var(--bg); color: #e0e0e0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; background: var(--card); border: 1px solid #30363d; border-radius: 12px; overflow: hidden; box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); }
        .header { background: #161b22; padding: 20px; border-bottom: 2px solid var(--cyber-blue); text-align: center; }
        .header h1 { margin: 0; color: var(--cyber-blue); text-transform: uppercase; letter-spacing: 2px; font-size: 1.3rem; }
        .main-content { padding: 30px; }
        .file-info { display: flex; align-items: center; gap: 20px; background: #1c2128; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid var(--cyber-yellow); }
        .hex-viewer { background: #000; color: #00ff00; padding: 20px; border-radius: 6px; font-size: 0.9rem; line-height: 1.5; border: 1px solid #333; margin-bottom: 25px; }
        .magic-highlight { background: var(--cyber-yellow); color: #000; font-weight: bold; padding: 0 4px; border-radius: 2px; }
        .options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .opt-btn { background: #161b22; border: 1px solid #30363d; padding: 12px; color: #fff; cursor: pointer; border-radius: 4px; font-family: inherit; transition: 0.2s; }
        .opt-btn:hover { border-color: var(--cyber-blue); }
        .opt-btn.selected { background: var(--cyber-blue); color: #000; font-weight: bold; }
        .btn-verify { width: 100%; padding: 18px; background: var(--cyber-blue); color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 30px; font-family: inherit; }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 4px; text-align: center; display: none; font-weight: bold; }
        .success { border: 1px solid #00ff80; color: #00ff80; background: rgba(0,255,128,0.05); }
        .error { border: 1px solid #ff3131; color: #ff3131; background: rgba(255,49,49,0.05); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>ANALISTA_SOC_L2: MAGIC_NUMBERS</h1>
        <small id="counter" style="color: var(--cyber-yellow)">LOADING_CASES...</small>
    </div>
    <div class="main-content" id="game-body">
        <div class="file-info">
            <div style="font-size: 2rem;">📄</div>
            <div>
                <strong>EVIDÊNCIA:</strong> <span id="file-name">---</span><br>
                <small style="color: #8b949e">ASSINATURA HEXADECIMAL DETECTADA</small>
            </div>
        </div>
        <div class="hex-viewer" id="hex-display"></div>
        <div class="options-grid" id="options"></div>
        <button class="btn-verify" onclick="_check()">VALIDAR ASSINATURA</button>
        <div id="feedback"></div>
    </div>
</div>

<script>
(function(){
    // Respostas em Base64 para não dar spoiler no código
    const _D = [
        { n: "imagem_secreta.jpg", h: "89 50 4E 47 0D 0A 1A 0A 00 00 00 0D", m: "89 50 4E 47", a: "UE5H" }, 
        { n: "documento.pdf", h: "4D 5A 90 00 03 00 00 00 04 00 00 00", m: "4D 5A", a: "RVhF" },       
        { n: "planilha.xlsx", h: "25 50 44 46 2D 31 2E 34 0A 25 D3 EB", m: "25 50 44 46", a: "UERG" }, 
        { n: "musica.mp3", h: "47 49 46 38 39 61 20 00 20 00 F7 00", m: "47 49 46", a: "R0lG" },      
        { n: "backup.zip", h: "52 61 72 21 1A 07 00 CF 90 73 00 00", m: "52 61 72 21", a: "UkFS" }    
    ];

    const types = ["JPEG", "PNG", "PDF", "EXE", "GIF", "ZIP", "RAR", "MP3", "MP4"];
    let idx = 0, sel = "";

    function render() {
        if (idx >= _D.length) {
            document.getElementById('game-body').innerHTML = "<h2 style='color:var(--cyber-blue); text-align:center;'>🏆 EXAME CONCLUÍDO</h2><p style='text-align:center;'>Todos os arquivos camuflados foram identificados.</p>";
            return;
        }
        const c = _D[idx];
        document.getElementById('file-name').innerText = c.n;
        document.getElementById('counter').innerText = `CASE: ${idx + 1} / ${_D.length}`;
        
        const hParts = c.h.split(" ");
        const mLen = c.m.split(" ").length;
        document.getElementById('hex-display').innerHTML = `00000000  <span class="magic-highlight">${hParts.slice(0, mLen).join(" ")}</span> ${hParts.slice(mLen).join(" ")}`;
        
        const grid = document.getElementById('options');
        grid.innerHTML = "";
        types.forEach(t => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = t;
            b.onclick = () => {
                document.querySelectorAll('.opt-btn').forEach(btn => btn.classList.remove('selected'));
                b.classList.add('selected');
                sel = t;
            };
            grid.appendChild(b);
        });
        document.getElementById('feedback').style.display = "none";
    }

    window._check = function() {
        if(!sel) return;
        const res = document.getElementById('feedback');
        res.style.display = "block";
        

        if (btoa(sel) === _D[idx].a) {
            res.className = "success";
            res.innerHTML = `✅ MATCH! Assinatura compatível com o formato ${sel}.`;
            setTimeout(() => { idx++; sel = ""; render(); }, 1500);
        } else {
            res.className = "error";
            res.innerText = "❌ ERRO: A assinatura não corresponde ao formato selecionado.";
        }
    };

    render();
})();
</script>
</body>
</html>
