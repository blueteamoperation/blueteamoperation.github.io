<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FIAP :: Perícia Digital - Forensic Report</title>
    <style>
        :root { --cyan: #00f2ff; --yellow: #ffd700; --bg: #0d0d0d; }
        body { background: var(--bg); color: var(--cyan); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 40px; margin: 0; }
        
        .workstation { background: #000; border: 1px solid var(--cyan); box-shadow: 0 0 30px rgba(0, 242, 255, 0.15); width: 100%; max-width: 800px; padding: 30px; border-radius: 8px; position: relative; }
        .workstation::before { content: "TERMINAL DE ANÁLISE FORENSE v3.0"; position: absolute; top: -12px; left: 20px; background: var(--bg); padding: 0 10px; font-size: 0.7rem; color: var(--yellow); }

        .mission-brief { border-left: 3px solid var(--yellow); padding-left: 20px; margin-bottom: 30px; }
        h2 { color: var(--yellow); margin-top: 0; text-transform: uppercase; font-size: 1.1rem; letter-spacing: 1px; }
        p { color: #888; font-size: 0.85rem; line-height: 1.5; }

        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; color: #555; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        
        input { 
            background: #080808; 
            border: 1px solid #222; 
            border-bottom: 2px solid #333; 
            color: #fff; 
            padding: 12px; 
            font-family: inherit;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--cyan); outline: none; background: #111; }

        .action-container { grid-column: span 2; text-align: center; margin-top: 30px; border-top: 1px solid #111; padding-top: 20px; }
        button { 
            background: transparent; 
            border: 1px solid var(--yellow); 
            color: var(--yellow); 
            padding: 15px 50px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        button:hover { background: var(--yellow); color: #000; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }

        #feedback { margin-top: 25px; text-align: center; font-weight: bold; font-size: 0.85rem; min-height: 25px; }
        .valid { color: #39ff14; text-shadow: 0 0 8px rgba(57, 255, 20, 0.5); }
        .invalid { color: #ff3131; text-shadow: 0 0 8px rgba(255, 49, 49, 0.5); }
        
        .img-preview { border: 1px solid #222; padding: 5px; background: #111; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="workstation">
        <div class="mission-brief">
            <h2>MISSÃO: EXTRAÇÃO DE METADADOS EXIF</h2>
            <p>
                Analise o arquivo <b>mustang.jpg</b>. Utilize ferramentas como <i>ExifTool</i> ou <i>ExifView</i> para extrair as propriedades brutas (Metadata) da evidência e preencha o relatório de custódia.
            </p>
            <center>
                <div class="img-preview">
                    <img src="https://raw.githubusercontent.com/blueteamoperation/blueteamoperation.github.io/refs/heads/main/MOD-2/foto.jpeg" width="280" alt="Evidência Forense">
                </div>
            </center>
        </div>

        <div class="report-grid">
            <div class="field">
                <label>01. Camera Model Name</label>
                <input type="text" id="camera" placeholder="Modelo do dispositivo...">
            </div>
            <div class="field">
                <label>02. Software Version</label>
                <input type="text" id="software" placeholder="Software de edição...">
            </div>
            <div class="field">
                <label>03. Create Date (AAAA:MM:DD)</label>
                <input type="text" id="createdate" placeholder="Data de captura...">
            </div>
            <div class="field">
                <label>04. GPS Position (Partial)</label>
                <input type="text" id="gps" placeholder="Ex: 23 deg 34' ...">
            </div>
            <div class="field" style="grid-column: span 2;">
                <label>05. User Comment (Flag)</label>
                <input type="text" id="flag" placeholder="Insira a FLAG extraída dos comentários">
            </div>

            <div class="action-container">
                <button onclick="_validateReport()">Validar Evidências</button>
            </div>
            
            <div id="feedback"></div>
        </div>
    </div>

    <script>
        function _validateReport() {
            const f = document.getElementById('feedback');
            
            // Coleta de dados com limpeza básica
            const c = document.getElementById('camera').value.toLowerCase().trim();
            const s = document.getElementById('software').value.toLowerCase().trim();
            const d = document.getElementById('createdate').value.trim();
            const g = document.getElementById('gps').value.toLowerCase().trim();
            const fl = document.getElementById('flag').value.trim();

         

            let score = 0;

            // Verificação por fragmentos e comprimentos para evitar "Ctrl+F" no código
            if (c.includes("iphone") && c.includes("15")) score++;
            if (s.includes("photo") && s.includes("shop")) score++;
            if (d.startsWith("2026") && d.includes("04") && d.endsWith("25")) score++;
            if (g.includes("23") && g.includes("deg") && g.includes("46")) score++;
            
            // Verificação da FLAG via Checksum simples (Soma dos caracteres ASCII)
            // METADATA_MASTER_2026 soma 1642
            let checkSum = 0;
            for (let i = 0; i < fl.length; i++) checkSum += fl.charCodeAt(i);
            if (checkSum === 1642 && fl.length === 20) score++;

            if(score === 5) {
                f.innerHTML = "[SISTEMA]: INTEGRIDADE CONFIRMADA. RELATÓRIO TÉCNICO ARQUIVADO COM SUCESSO.";
                f.className = "valid";
            } else {
                f.innerHTML = "[SISTEMA]: FALHA NA CUSTÓDIA. DADOS INCONSISTENTES COM A EVIDÊNCIA ANALISADA.";
                f.className = "invalid";
            }
        }
    </script>
</body>
</html>
