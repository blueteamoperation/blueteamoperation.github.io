<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FIAP :: Perícia Digital - Extração de Metadados</title>
    <style>
        :root { --cyan: #00f2ff; --yellow: #ffd700; --bg: #0d0d0d; }
        body { background: var(--bg); color: var(--cyan); font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; padding: 40px; margin: 0; }
        
        .workstation { background: #000; border: 1px solid var(--cyan); box-shadow: 0 0 30px rgba(0, 242, 255, 0.15); width: 100%; max-width: 800px; padding: 30px; border-radius: 8px; position: relative; }
        .workstation::before { content: "FORENSIC WORKSTATION v2.0"; position: absolute; top: -12px; left: 20px; background: var(--bg); padding: 0 10px; font-size: 0.7rem; color: var(--yellow); }

        .mission-brief { border-left: 3px solid var(--yellow); padding-left: 20px; margin-bottom: 30px; }
        h2 { color: var(--yellow); margin-top: 0; text-transform: uppercase; font-size: 1.2rem; }
        p { color: #888; font-size: 0.9rem; line-height: 1.5; }

        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 20px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; color: #555; margin-bottom: 8px; font-weight: bold; }
        
        input { 
            background: #111; 
            border: none; 
            border-bottom: 2px solid #333; 
            color: #fff; 
            padding: 10px; 
            font-family: inherit;
            transition: 0.4s;
        }
        input:focus { border-bottom-color: var(--cyan); outline: none; background: #161616; }

        .action-container { grid-column: span 2; text-align: center; margin-top: 20px; }
        button { 
            background: transparent; 
            border: 1px solid var(--yellow); 
            color: var(--yellow); 
            padding: 15px 40px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        button:hover { background: var(--yellow); color: #000; box-shadow: 0 0 15px var(--yellow); }

        #feedback { margin-top: 25px; text-align: center; font-weight: bold; font-size: 0.9rem; min-height: 20px; }
        .valid { color: #00ff00; text-shadow: 0 0 5px #00ff00; }
        .invalid { color: #ff0000; text-shadow: 0 0 5px #ff0000; }
    </style>
</head>
<body>

    <div class="workstation">
        <div class="mission-brief">
            <h2>MISSÃO: RELATÓRIO DE EVIDÊNCIAS</h2>
            <p>Utilize uma ferramenta de análise (ExifTool ou similar) na imagem <b>mustang.jpg</b> fornecida pelo instrutor. Extraia os metadados brutos e preencha o relatório técnico abaixo para validar a cadeia de custódia. <br>
            <center><img src="https://raw.githubusercontent.com/blueteamoperation/blueteamoperation.github.io/refs/heads/main/MOD-2/foto.jpeg" width="300" heigth="300"></center><br> </p>
        </div>

        <div class="report-grid">
            <div class="field">
                <label>MODELO DA CÂMERA (Camera Model Name)</label>
                <input type="text" id="camera" placeholder="Aguardando dados...">
            </div>
            <div class="field">
                <label>SOFTWARE DE EDIÇÃO (Software)</label>
                <input type="text" id="software" placeholder="Aguardando dados...">
            </div>
            <div class="field">
                <label>DATA DE CRIAÇÃO (Create Date - Formato AAAA:MM:DD)</label>
                <input type="text" id="createdate" placeholder="Ex: 2024:12:31">
            </div>
            <div class="field">
                <label>COORDENADAS GPS (GPS Position)</label>
                <input type="text" id="gps" placeholder="Ex: 23 deg 34' 23.88'' S...">
            </div>
            <div class="field" style="grid-column: span 2;">
                <label>FLAG ENCONTRADA (User Comment)</label>
                <input type="text" id="flag" placeholder="Digite a flag encontrada nos comentários">
            </div>

            <div class="action-container">
                <button onclick="submitReport()">Enviar para Validação</button>
            </div>
            
            <div id="feedback"></div>
        </div>
    </div>




    <script>
        function submitReport() {
            const camera = document.getElementById('camera').value.toLowerCase();
            const software = document.getElementById('software').value.toLowerCase();
            const date = document.getElementById('createdate').value;
            const gps = document.getElementById('gps').value;
            const flag = document.getElementById('flag').value.trim();
            const feedback = document.getElementById('feedback');

            // Validação lógica baseada nos metadados que inserimos anteriormente
            const checkCamera = camera.includes("iphone 15");
            const checkSoftware = software.includes("photoshop");
            const checkDate = date.startsWith("2026:04:25");
            const checkGPS = gps.includes("23 deg") && gps.includes("46 deg");
            const checkFlag = flag === "METADATA_MASTER_2026";

            if(checkCamera && checkSoftware && checkDate && checkGPS && checkFlag) {
                feedback.innerHTML = "[SISTEMA]: RELATÓRIO DE PERÍCIA VALIDADO. INTEGRIDADE DA PROVA CONFIRMADA.";
                feedback.className = "valid";
            } else {
                feedback.innerHTML = "[SISTEMA]: ERRO NA VALIDAÇÃO. METADADOS INCONSISTENTES COM A EVIDÊNCIA.";
                feedback.className = "invalid";
            }
        }
    </script>
</body>
</html>
