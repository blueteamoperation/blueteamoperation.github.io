<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FIAP :: Forensic Workstation</title>
    <style>
        :root { --cyan: #00f2ff; --yellow: #ffd700; --bg: #0d0d0d; }
        body { background: var(--bg); color: var(--cyan); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 40px; margin: 0; }
        .workstation { background: #000; border: 1px solid var(--cyan); box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); width: 100%; max-width: 800px; padding: 30px; border-radius: 8px; position: relative; }
        .workstation::before { content: "ENCRYPTED_REPORT_TERMINAL"; position: absolute; top: -12px; left: 20px; background: var(--bg); padding: 0 10px; font-size: 0.7rem; color: var(--yellow); }
        h2 { color: var(--yellow); text-transform: uppercase; font-size: 1.1rem; border-left: 3px solid var(--yellow); padding-left: 15px; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; color: #555; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        input { background: #080808; border: 1px solid #222; border-bottom: 2px solid #333; color: #fff; padding: 12px; font-family: inherit; outline: none; }
        input:focus { border-color: var(--cyan); background: #111; }
        .action-container { grid-column: span 2; text-align: center; margin-top: 30px; }
        button { background: transparent; border: 1px solid var(--yellow); color: var(--yellow); padding: 15px 50px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: var(--yellow); color: #000; box-shadow: 0 0 20px var(--yellow); }
        #feedback { margin-top: 25px; text-align: center; font-weight: bold; min-height: 25px; }
        .valid { color: #39ff14; }
        .invalid { color: #ff3131; }
    </style>
</head>
<body>

    <div class="workstation">
        <h2>MISSÃO: RELATÓRIO DE CUSTÓDIA</h2>
        <p style="color: #666; font-size: 0.85rem;">Analise os metadados da imagem mustang.jpg e preencha os campos abaixo.</p>
        
        <center>
            <img src="https://raw.githubusercontent.com/blueteamoperation/blueteamoperation.github.io/refs/heads/main/MOD-2/foto.jpeg" width="250" style="border: 1px solid #333; margin: 15px 0;">
        </center>

        <div class="report-grid">
            <div class="field">
                <label>Camera Model</label>
                <input type="text" id="camera" autocomplete="off">
            </div>
            <div class="field">
                <label>Software</label>
                <input type="text" id="software" autocomplete="off">
            </div>
            <div class="field">
                <label>Create Date</label>
                <input type="text" id="createdate" placeholder="AAAA:MM:DD" autocomplete="off">
            </div>
            <div class="field">
                <label>GPS Position (Partial)</label>
                <input type="text" id="gps" autocomplete="off">
            </div>
            <div class="field" style="grid-column: span 2;">
                <label>User Comment (Flag)</label>
                <input type="text" id="flag" placeholder="Digite a FLAG extraída" autocomplete="off">
            </div>

            <div class="action-container">
                <button onclick="validate()">Validar Cadeia de Custódia</button>
            </div>
            
            <div id="feedback"></div>
        </div>
    </div>

    <script>
       
        async function getHash(str) {
            const msgBuffer = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function validate() {
            const f = document.getElementById('feedback');
            
      
            const camera = document.getElementById('camera').value.toLowerCase().trim();
            const software = document.getElementById('software').value.toLowerCase().trim();
            const date = document.getElementById('createdate').value.trim();
            const gps = document.getElementById('gps').value.toLowerCase().trim();
            const flag = document.getElementById('flag').value.trim();

    
            const checkText = (camera.includes("iphone") && camera.includes("15")) && 
                              (software.includes("photo") && software.includes("shop"));

           
            const flagHash = await getHash(flag);
            const targetHash = "f50125a0720468305c6fbe36915f013f9c6d36d4a530eb74944d673752674e3e";

            // Verificação de data e GPS simples
            const checkData = (date === "2026:04:25") && (gps.includes("23") && gps.includes("46"));

            if(checkText && checkData && (flagHash === targetHash)) {
                f.innerHTML = "[SUCESSO]: EVIDÊNCIAS CONFEREM. FLAG VALIDADA.";
                f.className = "valid";
            } else {
                f.innerHTML = "[FALHA]: DADOS INCONSISTENTES COM A PROVA PERICIAL.";
                f.className = "invalid";
            }
        }
    </script>
</body>
</html>
