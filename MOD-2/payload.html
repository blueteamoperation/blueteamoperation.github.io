<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Desafio: Decoding de Artefato</title>
    <style>
        :root { --neon-blue: #00d4ff; --bg-dark: #0a0a0a; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Courier New', monospace; padding: 40px; text-align: center; }
        .terminal { border: 1px solid var(--neon-blue); padding: 30px; display: inline-block; background: #111; box-shadow: 0 0 15px var(--neon-blue); max-width: 800px; }
        .payload { background: #000; padding: 20px; border: 1px dashed var(--neon-blue); word-break: break-all; margin: 20px 0; color: var(--neon-blue); font-size: 1rem; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: var(--neon-blue); margin-bottom: 15px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--neon-blue); }
        button { width: 100%; padding: 12px; background: var(--neon-blue); color: #000; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        #feedback { margin-top: 15px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

<div class="terminal">
    <h2>📡 INTERCEPTAÇÃO DE PAYLOAD</h2>
    <p style="color: #888;">Analise o artefato abaixo. Ele foi ofuscado com camadas de encoding para evadir o IDS.</p>
    
    <div class="payload">
        c/Vz9ndx9HX1C/FXcHIM9nT2BwA=
    </div>

    <p style="font-size: 0.8rem; color: #555;">DICA: A sequência de ofuscação foi: <strong>BASE64 -> BASE64 -> HEX</strong>.</p>
    
    <input type="text" id="flagInput" placeholder="QUAL O CONTEÚDO DECODIFICADO?" autocomplete="off">
    <button onclick="verificar()">SUBMETER ANÁLISE</button>
    <p id="feedback"></p>
</div>

<script>
    function verificar() {
        const val = document.getElementById('flagInput').value.trim().toUpperCase();
        const f = document.getElementById('feedback');
        
        if (!val) return;

        // Lógica de Validação Blindada (Sem a resposta no código)
        // Resposta esperada: ACESSO_RESTRITO_SISTEMA_OPERACIONAL
        // Checksum da soma ASCII: 2754
        let checkSum = 0;
        for (let i = 0; i < val.length; i++) {
            checkSum += val.charCodeAt(i);
        }

        // Validação adicional de segurança (XOR do primeiro e último char)
        // 'A' ^ 'L' = 13
        const securityGate = (val.charCodeAt(0) ^ val.charCodeAt(val.length - 1)) === 13;

        if (checkSum === 2754 && securityGate && val.length === 35) {
            f.innerHTML = "✅ SUCESSO! Payload deofuscado com integridade.";
            f.style.color = "#00ff41";
            document.querySelector('.terminal').style.boxShadow = "0 0 30px #00ff41";
        } else {
            f.innerHTML = "❌ NEGADO. Falha na decodificação do artefato.";
            f.style.color = "#ff3131";
            document.querySelector('.terminal').style.boxShadow = "0 0 15px #ff3131";
        }
    }

    // Permitir Enter
    document.getElementById('flagInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') verificar();
    });
</script>

</body>
</html>
