<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Desafio: Decoding de Artefato</title>
    <style>
        :root { --neon-blue: #00d4ff; --bg-dark: #0a0a0a; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Courier New', monospace; padding: 40px; text-align: center; }
        .terminal { border: 1px solid var(--neon-blue); padding: 30px; display: inline-block; background: #111; box-shadow: 0 0 15px var(--neon-blue); max-width: 800px; transition: 0.3s; }
        .payload { background: #000; padding: 20px; border: 1px dashed var(--neon-blue); word-break: break-all; margin: 20px 0; color: var(--neon-blue); font-size: 1rem; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: var(--neon-blue); margin-bottom: 15px; box-sizing: border-box; outline: none; text-transform: uppercase; }
        button { width: 100%; padding: 12px; background: var(--neon-blue); color: #000; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        #feedback { margin-top: 15px; font-weight: bold; min-height: 20px; }
        .success-border { border-color: #00ff41 !important; box-shadow: 0 0 25px #00ff41 !important; }
        .error-border { border-color: #ff3131 !important; box-shadow: 0 0 25px #ff3131 !important; }
    </style>
</head>
<body>

<div class="terminal" id="term">
    <h2>📡 INTERCEPTAÇÃO DE PAYLOAD</h2>
    <p style="color: #888;">Analise o artefato e realize a deofuscação multinível.</p>
    
    <div class="payload">
        c/Vz9ndx9HX1C/FXcHIM9nT2BwA=
    </div>

    <p style="font-size: 0.8rem; color: #555;">CAMADAS DETECTADAS: <strong>BASE64 -> BASE64 -> HEX</strong>.</p>
    
    <input type="text" id="flagInput" placeholder="CONTEÚDO DECODIFICADO" autocomplete="off">
    <button onclick="verificar()">INJETAR RESPOSTA</button>
    <p id="feedback"></p>
</div>

<script>
    function verificar() {
        const input = document.getElementById('flagInput');
        const f = document.getElementById('feedback');
        const term = document.getElementById('term');
        const val = input.value.trim().toUpperCase();
        
        if (!val) return;

        const target = [69, 78, 67, 79, 68, 65, 77, 69, 78, 84, 79, 32, 66, 65, 83, 73, 67, 79];
        
     
        const isMatch = (val.length === target.length) && 
                        val.split('').every((char, i) => char.charCodeAt(0) === target[i]);

        if (isMatch) {
            f.innerHTML = "✅ SUCESSO! PAYLOAD RECONSTITUÍDO.";
            f.style.color = "#00ff41";
            term.className = "terminal success-border";
        } else {
            f.innerHTML = "❌ NEGADO! ERRO NA DECODIFICAÇÃO.";
            f.style.color = "#ff3131";
            term.className = "terminal error-border";
            setTimeout(() => { term.className = "terminal"; }, 1500);
            input.value = "";
        }
    }

    document.getElementById('flagInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') verificar();
    });
</script>

</body>
</html>
