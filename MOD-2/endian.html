<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FIAP :: Little to Big Endian Challenge</title>
    <style>
        body { background: #0a0a0a; color: #00f2ff; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #ffd700; padding: 30px; background: #000; box-shadow: 0 0 15px #00f2ff; text-align: center; max-width: 500px; }
        h2 { color: #ffd700; }
        .hex-data { font-size: 1.5rem; background: #222; padding: 10px; margin: 20px 0; border: 1px dashed #ffd700; }
        input { background: #111; border: 1px solid #00f2ff; color: #ffd700; padding: 10px; width: 80%; margin-bottom: 20px; text-align: center; }
        button { background: #ffd700; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 80%; }
        #msg { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>DESAFIO: FILE SIZE HEADER</h2>
        <p>Um arquivo malicioso tem o seguinte campo de tamanho (4 bytes) em <b>Little-Endian</b>:</p>
        <div class="hex-data">A0 0F 00 00</div>
        <p>Qual o tamanho do arquivo em <b>Decimal</b>?</p>
        
        <input type="number" id="ans" placeholder="Digite o valor decimal...">
        <button onclick="verificar()">VALIDAR INTEGRIDADE</button>
        <div id="msg"></div>
    </div>

    <script>
        function verificar() {
            const resposta = document.getElementById('ans').value;
            const msg = document.getElementById('msg');
            
            // L-E: A0 0F 00 00 -> B-E: 00 00 0F A0
            // 0xFA0 em decimal é 4000
            if(resposta == 4000) {
                msg.style.color = "#00ff00";
                msg.innerHTML = "SUCESSO! O tamanho real é 4000 bytes (0x0FA0).";
            } else {
                msg.style.color = "#ff0000";
                msg.innerHTML = "ERRO! Você esqueceu de inverter os bytes ou errou o cálculo.";
            }
        }
    </script>
</body>
</html>
