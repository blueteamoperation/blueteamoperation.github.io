<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FIAP :: Endianness Forensic Challenge</title>
    <style>
        :root { --cyan: #00f2ff; --gold: #ffd700; --bg: #0a0a0a; }
        body { background: var(--bg); color: var(--cyan); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 2px solid var(--gold); padding: 30px; background: #000; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); text-align: center; max-width: 500px; position: relative; }
        h2 { color: var(--gold); letter-spacing: 2px; margin-top: 0; }
        .hex-data { font-size: 1.8rem; background: #111; padding: 15px; margin: 20px 0; border: 1px dashed var(--gold); color: #fff; }
        input { background: #000; border: 1px solid var(--cyan); color: var(--gold); padding: 12px; width: 80%; margin-bottom: 20px; text-align: center; font-size: 1.1rem; outline: none; }
        button { background: var(--gold); color: #000; border: none; padding: 12px 20px; cursor: pointer; font-weight: bold; width: 85%; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
        #msg { margin-top: 20px; font-weight: bold; min-height: 24px; font-size: 0.9rem; }
        .hint { font-size: 0.7rem; color: #444; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>[FILE_SIZE_FORENSICS]</h2>
        <p>Um cabeçalho malicioso indica o tamanho do arquivo (4 bytes) em <b>Little-Endian</b>:</p>
        
        <div class="hex-data">A0 0F 00 00</div>
        
        <p>Converta para o valor <b>Decimal</b> real:</p>
        
        <input type="text" id="ans" placeholder="DIGITE O VALOR..." autocomplete="off">
        <button onclick="_verify()">Validar Integridade</button>
        
        <div id="msg"></div>
        <div class="hint">DICA: Inverta a ordem dos bytes antes de converter o Hex para Dec.</div>
    </div>

    <script>
        function _verify() {
            const input = document.getElementById('ans');
            const msg = document.getElementById('msg');
            const val = parseInt(input.value) || 0;

       
            
            const checkA = (val >> 0x5) === 0x7D; 
            const checkB = (val * 0x2 + 0x64) === 0x1FA4;

            if(checkA && checkB) {
                msg.style.color = "#39ff14";
                msg.innerHTML = "INTEGRIDADE CONFIRMADA! Tamanho de " + val + " bytes extraído com sucesso.";
                input.style.borderColor = "#39ff14";
            } else {
                msg.style.color = "#ff3131";
                msg.innerHTML = "ERRO: Valor decimal não corresponde ao Header Little-Endian.";
                input.style.borderColor = "#ff3131";
            }
        }

        // Bloqueia letras no input
        document.getElementById('ans').addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
